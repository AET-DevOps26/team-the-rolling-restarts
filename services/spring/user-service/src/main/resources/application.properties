spring.application.name=user-service
server.port=8081

spring.docker.compose.enabled=false

# Classic Prometheus scrape endpoint. Set here (not only in application-production/-dev) because
# docker-compose (both dev and prod overlays) never sets SPRING_PROFILES_ACTIVE, so no profile is
# active by default and profile-only config would silently never take effect for those deployments.
management.endpoints.web.exposure.include=health,prometheus
# Emit histogram buckets for http.server.requests on the classic scrape endpoint so the
# "Duration Heatmap"/"Duration percentiles" Grafana panels (histogram_quantile over le buckets)
# have data; the default Micrometer Prometheus registry only exports count/sum/max otherwise.
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# MongoDB (credentials provided by profile or env vars — no hardcoded defaults)
spring.mongodb.uri=${SPRING_MONGODB_URI:}

# Pagination defaults
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100

# Issuer claim for JWTs — must match the gateway's spring.security.oauth2.resourceserver.jwt.issuer-uri
jwt.issuer=${JWT_ISSUER:http://localhost:8081}

# content-service base URL for service-to-service subscription count updates
content-service.base-url=${CONTENT_SERVICE_URL:http://localhost:8082}

# Service-to-service OAuth2 client (client_credentials grant). user-service authenticates to its
# OWN token endpoint to obtain a 'source.write'-scoped machine token, then uses it to call
# content-service's subscribe/unsubscribe endpoints — never the end user's forwarded JWT.
# The secret has NO default: it must be supplied (env SERVICE_CLIENT_SECRET) outside the dev profile.
service.client.id=${SERVICE_CLIENT_ID:user-service}
service.client.secret=${SERVICE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.content-service.provider=user-service-auth
spring.security.oauth2.client.registration.content-service.client-id=${service.client.id}
spring.security.oauth2.client.registration.content-service.client-secret=${service.client.secret}
spring.security.oauth2.client.registration.content-service.authorization-grant-type=client_credentials
spring.security.oauth2.client.registration.content-service.scope=source.write
spring.security.oauth2.client.provider.user-service-auth.token-uri=${SERVICE_AUTH_TOKEN_URI:http://localhost:8081/oauth2/token}

springdoc.api-docs.path=/v3/api-docs
# Emit application/json (not */*) so generated consumer clients can type request/response bodies.
springdoc.default-produces-media-type=application/json
springdoc.default-consumes-media-type=application/json
