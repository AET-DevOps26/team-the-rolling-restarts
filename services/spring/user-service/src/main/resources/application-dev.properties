spring.mongodb.uri=mongodb://root:secret@localhost:27017/users?authSource=admin

# Dev-only secret for the service-to-service client_credentials client (see application.properties).
# Production must supply a real value via SERVICE_CLIENT_SECRET.
service.client.secret=dev-service-secret

management.endpoints.web.exposure.include=*
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.data.mongodb=DEBUG
