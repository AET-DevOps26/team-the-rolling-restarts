spring.application.name=content-service
server.port=8082

spring.docker.compose.enabled=false

# MongoDB (credentials provided by profile or env vars — no hardcoded defaults)
spring.mongodb.uri=${SPRING_MONGODB_URI:}
# Create the @Indexed/@TextIndexed indexes (incl. the headline+snippet text index that the
# article search relies on) on startup. Spring Data MongoDB disables this by default, which
# otherwise makes any ?q= search fail with "text index required for $text query".
spring.data.mongodb.auto-index-creation=true

# JWT validation (tokens issued by user-service)
spring.security.oauth2.resourceserver.jwt.issuer-uri=${JWT_ISSUER_URI:http://localhost:8081}

# RSS fetch interval (default: 15 minutes)
rss.fetch.interval-ms=${RSS_FETCH_INTERVAL_MS:900000}

# Pagination defaults
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100

springdoc.api-docs.path=/v3/api-docs
# Emit application/json (not */*) so generated consumer clients can type request/response bodies.
springdoc.default-produces-media-type=application/json
springdoc.default-consumes-media-type=application/json
