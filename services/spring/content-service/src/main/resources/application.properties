spring.application.name=content-service
server.port=8082

spring.docker.compose.enabled=false

# MongoDB (separate database for content)
spring.mongodb.uri=${SPRING_MONGODB_URI:mongodb://root:secret@localhost:27017/content?authSource=admin}

# JWT validation (tokens issued by user-service)
spring.security.oauth2.resourceserver.jwt.issuer-uri=${JWT_ISSUER_URI:http://localhost:8081}

# RSS fetch interval (default: 15 minutes)
rss.fetch.interval-ms=${RSS_FETCH_INTERVAL_MS:900000}

# Serve OpenAPI docs at the gateway-prefixed path
springdoc.api-docs.path=/api/content/v3/api-docs
