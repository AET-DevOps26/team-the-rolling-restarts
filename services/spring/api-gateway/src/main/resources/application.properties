spring.application.name=api-gateway
server.port=8080

spring.docker.compose.enabled=false

# Classic Prometheus scrape endpoint. Set here (not only in application-production/-dev) because
# docker-compose (both dev and prod overlays) never sets SPRING_PROFILES_ACTIVE, so no profile is
# active by default and profile-only config would silently never take effect for those deployments.
management.endpoints.web.exposure.include=health,prometheus

# Downstream service routing (Spring Cloud Gateway MVC)
spring.cloud.gateway.server.webmvc.routes[0].id=user-service-docs
spring.cloud.gateway.server.webmvc.routes[0].uri=${USER_SERVICE_URL:http://localhost:8081}
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/users/v3/api-docs/**
spring.cloud.gateway.server.webmvc.routes[0].filters[0]=StripPrefix=2

spring.cloud.gateway.server.webmvc.routes[1].id=user-service
spring.cloud.gateway.server.webmvc.routes[1].uri=${USER_SERVICE_URL:http://localhost:8081}
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/users/**
spring.cloud.gateway.server.webmvc.routes[1].filters[0]=StripPrefix=2

spring.cloud.gateway.server.webmvc.routes[2].id=content-service
spring.cloud.gateway.server.webmvc.routes[2].uri=${CONTENT_SERVICE_URL:http://localhost:8082}
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/content/**
spring.cloud.gateway.server.webmvc.routes[2].filters[0]=StripPrefix=2

spring.cloud.gateway.server.webmvc.routes[3].id=gen-ai
spring.cloud.gateway.server.webmvc.routes[3].uri=${GEN_AI_URL:http://localhost:8000}
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/api/ai/**
spring.cloud.gateway.server.webmvc.routes[3].filters[0]=StripPrefix=2

# Aggregated OpenAPI docs from all microservices
springdoc.swagger-ui.urls[0].name=Gateway
springdoc.swagger-ui.urls[0].url=/v3/api-docs
springdoc.swagger-ui.urls[1].name=User Service
springdoc.swagger-ui.urls[1].url=/api/users/v3/api-docs
springdoc.swagger-ui.urls[2].name=Content Service
springdoc.swagger-ui.urls[2].url=/api/content/v3/api-docs
springdoc.swagger-ui.urls[3].name=GenAI Service
springdoc.swagger-ui.urls[3].url=/api/ai/openapi.json

# CORS — comma-separated allowed origins. NO wildcard default: if CORS_ALLOWED_ORIGINS is unset
# the gateway allows no cross-origin requests (fail closed) rather than silently serving '*'.
# The dev profile sets '*' for local convenience; production must set the real origin(s).
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:}

# JWT issuer URI (points to user-service OAuth2 Authorization Server)
spring.security.oauth2.resourceserver.jwt.issuer-uri=${JWT_ISSUER_URI:http://localhost:8081}
