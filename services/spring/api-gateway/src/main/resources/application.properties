spring.application.name=api-gateway
server.port=8080

spring.docker.compose.enabled=false

# Downstream service routing (Spring Cloud Gateway MVC)
spring.cloud.gateway.mvc.routes[0].id=user-service
spring.cloud.gateway.mvc.routes[0].uri=${USER_SERVICE_URL:http://localhost:8081}
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/api/users/**
spring.cloud.gateway.mvc.routes[0].filters[0]=RewritePath=/api/users(?<segment>/?.*), ${segment}

spring.cloud.gateway.mvc.routes[1].id=content-service
spring.cloud.gateway.mvc.routes[1].uri=${CONTENT_SERVICE_URL:http://localhost:8082}
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/api/content/**
spring.cloud.gateway.mvc.routes[1].filters[0]=RewritePath=/api/content(?<segment>/?.*), ${segment}

# Aggregated OpenAPI docs from all microservices
springdoc.swagger-ui.urls[0].name=Gateway
springdoc.swagger-ui.urls[0].url=/v3/api-docs
springdoc.swagger-ui.urls[1].name=User Service
springdoc.swagger-ui.urls[1].url=/api/users/v3/api-docs
springdoc.swagger-ui.urls[2].name=Content Service
springdoc.swagger-ui.urls[2].url=/api/content/v3/api-docs

# JWT issuer URI (points to user-service OAuth2 Authorization Server)
spring.security.oauth2.resourceserver.jwt.issuer-uri=${JWT_ISSUER_URI:http://localhost:8081}
