name: Deploy Monitoring

# Redeploys only when something monitoring-related changes — dashboards, provisioning, the
# monitoring Helm templates/values, or the raw-manifest equivalents. Unlike deploy_kubernetes.yml,
# this does NOT wait on build-and-package/CI: grafana-lgtm runs an upstream public image
# (grafana/otel-lgtm), nothing here gets built or pushed by this repo's own pipeline.
on:
  push:
    branches: [main]
    paths:
      - "infra/grafana/**"
      - "infra/helm/files/grafana/**"
      - "infra/helm/templates/monitoring.yaml"
      - "infra/helm/templates/monitoring-rbac.yaml"
      - "infra/k8s/configmaps/grafana-lgtm-config.yml"
      - "infra/k8s/deployments/grafana-lgtm-deployment.yml"
      - "infra/k8s/rbac/grafana-lgtm-rbac.yml"
      - "infra/k8s/services/grafana-lgtm-service.yml"
  workflow_dispatch:

# Same group as deploy_kubernetes.yml: both run `helm upgrade` against the same release, and two
# concurrent Helm operations on one release conflict ("another operation ... is in progress") —
# serializing them here prevents that race instead of just hoping the timing doesn't overlap.
concurrency:
  group: deploy-k8s
  cancel-in-progress: false

jobs:
  deploy-monitoring:
    runs-on: ubuntu-latest
    environment: production

    env:
      HELM_RELEASE: newsgenai
      HELM_CHART: ./infra/helm

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_BASE64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Ensure monitoring namespace exists
        run: kubectl create namespace monitoring-rolling-restarts --dry-run=client -o yaml | kubectl apply -f -

      # --reuse-values: this deploy only ever touches infra/grafana/* content, never secrets or
      # image tags, so it reuses whatever the last full deploy_kubernetes.yml run already set for
      # those instead of re-supplying them — no mongo/JWT/service-client secrets or image-values
      # needed here at all. Requires the release to already exist (first-ever install must go
      # through deploy_kubernetes.yml once).
      - name: Deploy with Helm
        run: |
          helm upgrade ${{ env.HELM_RELEASE }} ${{ env.HELM_CHART }} \
            --reuse-values \
            -f infra/helm/values.yaml -f infra/helm/values-prod.yaml \
            --wait --timeout 5m

      - name: Diagnose on failure
        if: failure()
        run: |
          echo "::group::Pods"
          kubectl get pods -n monitoring-rolling-restarts -o wide || true
          echo "::endgroup::"
          echo "::group::Recent events"
          kubectl get events -n monitoring-rolling-restarts --sort-by=.lastTimestamp | tail -40 || true
          echo "::endgroup::"
          echo "::group::describe deployment/grafana-lgtm"
          kubectl describe deployment grafana-lgtm -n monitoring-rolling-restarts 2>/dev/null | sed -n '/Conditions:/,/Events:/p' || true
          echo "::endgroup::"
          echo "::group::logs grafana-lgtm (current)"
          kubectl logs -n monitoring-rolling-restarts -l app=grafana-lgtm --tail=100 2>/dev/null || true
          echo "::endgroup::"
          echo "::group::logs grafana-lgtm (previous)"
          kubectl logs -n monitoring-rolling-restarts -l app=grafana-lgtm --previous --tail=100 2>/dev/null || true
          echo "::endgroup::"

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/grafana-lgtm -n monitoring-rolling-restarts --timeout=120s
          echo "grafana-lgtm rolled out successfully."
