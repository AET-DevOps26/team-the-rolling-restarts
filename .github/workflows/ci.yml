name: CI

on:
  push:
    paths-ignore:
      - 'README.md'
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: api-gateway
            working_directory: services/spring
            command: ./gradlew :api-gateway:test --no-daemon
          - service: user-service
            working_directory: services/spring
            command: ./gradlew :user-service:test --no-daemon
          - service: content-service
            working_directory: services/spring
            command: ./gradlew :content-service:test --no-daemon
          - service: gen-ai
            working_directory: services/gen-ai
            command: |
              pip install -e .[dev]
              status=0
              pytest || status=$?
              if [[ $status -eq 5 ]]; then
                echo "No tests collected for ${SERVICE_NAME}; skipping test execution."
                exit 0
              fi
              exit $status
          - service: web-client
            working_directory: web-client
            command: npm ci && npm run lint && npm run build

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup Node
        if: matrix.service == 'web-client'
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web-client/package-lock.json

      - name: Setup Python
        if: matrix.service == 'gen-ai'
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            services/gen-ai/pyproject.toml

      - name: Setup Java
        if: contains(fromJSON('["api-gateway","user-service","content-service"]'), matrix.service)
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      # Code-first: the Spring services are self-contained (no generated server stubs). Consumers
      # generate their client from the COMMITTED contract (lightweight, no Spring boot). The web
      # client uses the generated TypeScript types for its cross-service calls, so generate them
      # before its build. (gen-ai does not consume its client yet; add the same step here when it
      # does.) The contract itself is produced and drift-checked in the openapi-contract job.
      - name: Generate web-client API types
        if: matrix.service == 'web-client'
        run: |
          npm ci
          npx openapi-typescript api/openapi.yaml -o web-client/src/generated/api.ts

      # gen-ai's client is generated from the committed contract and installed, so it is both
      # continuously validated (Python-specific generation issues surface here) and importable by
      # tests the moment gen-ai starts using it — no further CI edits needed.
      - name: Generate and install gen-ai API client
        if: matrix.service == 'gen-ai'
        run: |
          python -m pip install --upgrade pip openapi-python-client
          rm -rf services/gen-ai/generated
          openapi-python-client generate --path api/openapi.yaml \
            --output-path services/gen-ai/generated --overwrite
          pip install ./services/gen-ai/generated

      - name: Build & test
        working-directory: ${{ matrix.working_directory }}
        env:
          SERVICE_NAME: ${{ matrix.service }}
        run: ${{ matrix.command }}

  openapi-contract:
    # Code-first contract check: regenerate api/openapi.yaml from the running services and fail if
    # the committed copy is stale, so the spec can never drift from the implementation.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'

      - name: Install tooling
        run: |
          npm ci
          python -m pip install --upgrade pip pyyaml

      - name: Regenerate contract from the services
        working-directory: services/spring
        run: |
          ./gradlew \
            :user-service:cleanTest :user-service:test \
            :content-service:cleanTest :content-service:test \
            --tests "*OpenApiDocGenerationTest" --no-daemon

      - name: Merge into the public contract
        run: |
          python3 api/scripts/merge-openapi.py --output api/openapi.yaml \
            services/spring/user-service/build/openapi/user-service.json:/api/users \
            services/spring/content-service/build/openapi/content-service.json:/api/content

      - name: Lint contract
        run: npx @redocly/cli@2.30.3 lint api/openapi.yaml

      - name: Fail if the committed contract is stale
        run: |
          if ! git diff --quiet -- api/openapi.yaml; then
            echo "::error::api/openapi.yaml is out of date with the Spring services."
            echo "Run 'make generate' (or push with the pre-push hook installed) and commit the result."
            git --no-pager diff -- api/openapi.yaml
            exit 1
          fi
          echo "OpenAPI contract is in sync with the services."

  terraform-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
      - name: Terraform init
        working-directory: infra/terraform/azure-vm
        run: terraform init -backend=false
      - name: Terraform validate
        working-directory: infra/terraform/azure-vm
        run: terraform validate
      - name: Terraform fmt check
        working-directory: infra/terraform/azure-vm
        run: terraform fmt -check -recursive

  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Helm lint
        # Supply the example secrets so the chart's required credentials render during lint.
        # Real secrets are injected at deploy time (see deploy_kubernetes.yml).
        run: helm lint infra/helm -f infra/helm/secrets-values.example.yaml

  contract-test:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Contract verification (if configured)
        shell: bash
        run: |
          if [[ -x ./scripts/run-pact.sh ]]; then
            ./scripts/run-pact.sh
          else
            echo "No contract verification script at scripts/run-pact.sh; skipping."
          fi
