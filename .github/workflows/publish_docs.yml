name: Publish Documentation
on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

concurrency:
  group: publish-docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Configure GitHub Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6
      - name: Generate PlantUML diagrams
        shell: bash
        run: |
          set -euo pipefail

          OUT=generated-diagrams
          rm -rf "$OUT"
          mkdir -p "$OUT"

          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            plantuml/plantuml:1.2026.1 \
            bash -lc 'set -euo pipefail; find docs/source/diagrams -name "*.puml" -print0 | while IFS= read -r -d "" f; do echo "Generating: $f"; java -jar /opt/plantuml.jar -tpng "$f"; done'

          find docs/source/diagrams -name '*.png' -print0 | while IFS= read -r -d '' p; do
            dest="$OUT/${p#./}"
            mkdir -p "$(dirname "$dest")"
            cp "$p" "$dest"
          done

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22

      - name: Copy docs that live next to their build context
        run: cp services/gen-ai/README.md docs/source/gen-ai-service.md

      - name: Build API docs
        run: npx @redocly/cli@2.39.0 build-docs api/openapi.yaml -o docs/source/api.html

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: 3.x

      - run: pip install mkdocs-material

      - name: Build site
        run: mkdocs build -f docs/source/mkdocs.yml

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: docs/site

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5