name: Deploy to Azure

# Continuous deployment pipeline:
#   0. verify-ci      - wait for the CI workflow for this commit to pass before
#      anything is built or deployed (skipped for manual workflow_dispatch runs).
#   1. build-and-push - build the three application images and push them to
#      Azure Container Registry (ACR).
#   2. deploy         - pull the freshly pushed images onto the Azure VM and
#      (re)start the docker compose stack.
#
# Required configuration is documented in docs/cicd-azure-deploy.md.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-azure-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

env:
  IMAGE_NAMESPACE: team-the-rolling-restarts

jobs:
  # CI gate: do not build/push/deploy a commit whose CI run hasn't passed. CI and this
  # workflow both start on the same push, so we poll the CI run for this exact SHA until it
  # finishes and require success. (Skipped for manual workflow_dispatch runs.)
  verify-ci:
    name: Require CI to pass
    runs-on: ubuntu-latest
    steps:
      - name: Wait for CI success on this commit
        if: github.event_name != 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          echo "Waiting for the CI workflow to finish for $SHA ..."
          for i in $(seq 1 60); do
            run=$(gh api "repos/$REPO/actions/workflows/ci.yml/runs?head_sha=$SHA&event=push&per_page=1" \
                  --jq '.workflow_runs[0] | "\(.status):\(.conclusion)"' 2>/dev/null || echo "")
            status="${run%%:*}"; conclusion="${run##*:}"
            if [ -z "$run" ] || [ "$run" = "null:null" ]; then
              echo "  CI run not found yet (attempt $i/60)…"
            elif [ "$status" = "completed" ]; then
              echo "  CI concluded: $conclusion"
              [ "$conclusion" = "success" ] && exit 0
              echo "::error::CI did not pass (conclusion=$conclusion) — aborting deploy."
              exit 1
            else
              echo "  CI status: $status (attempt $i/60)…"
            fi
            sleep 15
          done
          echo "::error::Timed out waiting for CI to finish for $SHA."
          exit 1

  build-and-push:
    name: Build & push images to ACR
    needs: verify-ci
    # Native arm64 runner (free for public repos) so images match the arm64
    # Azure VM (Standard_B2ps_v2 / server-arm64) without QEMU emulation.
    runs-on: ubuntu-24.04-arm
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      registry_base: ${{ steps.meta.outputs.registry_base }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Generate OpenAPI clients
        run: |
          npm ci
          python -m pip install --upgrade pip
          python -m pip install openapi-python-client pyyaml
          chmod +x api/scripts/gen-all.sh
          ./api/scripts/gen-all.sh

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name "${{ vars.ACR_NAME }}"

      - name: Compute metadata
        id: meta
        run: |
          SHA="${GITHUB_SHA::7}"
          REGISTRY_BASE="${{ vars.ACR_LOGIN_SERVER }}/${IMAGE_NAMESPACE}"
          echo "image_tag=$SHA" >> "$GITHUB_OUTPUT"
          echo "registry_base=$REGISTRY_BASE" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build & push web-client
        uses: docker/build-push-action@v7.2.0
        with:
          context: ./web-client
          file: ./web-client/Dockerfile
          target: production
          push: true
          tags: |
            ${{ steps.meta.outputs.registry_base }}/web-client:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.registry_base }}/web-client:latest
          cache-from: type=gha,scope=web-client
          cache-to: type=gha,mode=max,scope=web-client

      # Spring is a Gradle multi-module project split into three deployable
      # services, each with its own Dockerfile under services/spring/. The build
      # context is the shared services/spring/ root so the modules can resolve.
      - name: Build & push api-gateway
        uses: docker/build-push-action@v7.2.0
        with:
          context: ./services/spring
          file: ./services/spring/api-gateway/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.registry_base }}/api-gateway:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.registry_base }}/api-gateway:latest
          cache-from: type=gha,scope=api-gateway
          cache-to: type=gha,mode=max,scope=api-gateway

      - name: Build & push user-service
        uses: docker/build-push-action@v7.2.0
        with:
          context: ./services/spring
          file: ./services/spring/user-service/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.registry_base }}/user-service:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.registry_base }}/user-service:latest
          cache-from: type=gha,scope=user-service
          cache-to: type=gha,mode=max,scope=user-service

      - name: Build & push content-service
        uses: docker/build-push-action@v7.2.0
        with:
          context: ./services/spring
          file: ./services/spring/content-service/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.registry_base }}/content-service:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.registry_base }}/content-service:latest
          cache-from: type=gha,scope=content-service
          cache-to: type=gha,mode=max,scope=content-service

      - name: Build & push gen-ai
        uses: docker/build-push-action@v7.2.0
        with:
          context: ./services/gen-ai
          file: ./services/gen-ai/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.registry_base }}/gen-ai:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.registry_base }}/gen-ai:latest
          cache-from: type=gha,scope=gen-ai
          cache-to: type=gha,mode=max,scope=gen-ai

  deploy:
    name: Deploy to Azure VM
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    env:
      REGISTRY_BASE: ${{ needs.build-and-push.outputs.registry_base }}
      IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
      DEPLOY_DIR: ${{ vars.DEPLOY_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Mint short-lived ACR token
        id: acr
        run: |
          TOKEN="$(az acr login --name "${{ vars.ACR_NAME }}" --expose-token --query accessToken -o tsv)"
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Generate deployment .env
        env:
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          MONGO_DATABASE: ${{ vars.MONGO_DATABASE }}
          MONGO_ROOT_USERNAME: ${{ secrets.MONGO_ROOT_USERNAME }}
          MONGO_ROOT_PASSWORD: ${{ secrets.MONGO_ROOT_PASSWORD }}
          JWT_RSA_PUBLIC_KEY: ${{ secrets.JWT_RSA_PUBLIC_KEY }}
          JWT_RSA_PRIVATE_KEY: ${{ secrets.JWT_RSA_PRIVATE_KEY }}
          SERVICE_CLIENT_SECRET: ${{ secrets.SERVICE_CLIENT_SECRET }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        run: |
          umask 077
          if [ -z "${SERVICE_CLIENT_SECRET:-}" ]; then
            echo "::error::SERVICE_CLIENT_SECRET secret is not configured. Set it in repo secrets before deploying to production."
            exit 1
          fi
          if [ -z "${GRAFANA_ADMIN_PASSWORD:-}" ]; then
            echo "::error::GRAFANA_ADMIN_PASSWORD secret is not configured. Set it in repo secrets before deploying to production."
            exit 1
          fi
          # A docker-compose --env-file is line-based and cannot hold multi-line values, so the
          # RSA PEMs are collapsed to a single line. user-service strips the PEM markers and all
          # whitespace before decoding (AuthorizationServerConfig.loadKeyPair), so this is lossless.
          JWT_RSA_PUBLIC_KEY_ONELINE="$(printf '%s' "$JWT_RSA_PUBLIC_KEY" | tr -d '\r\n')"
          JWT_RSA_PRIVATE_KEY_ONELINE="$(printf '%s' "$JWT_RSA_PRIVATE_KEY" | tr -d '\r\n')"
          cat > deploy.env <<EOF
          REGISTRY_BASE=${REGISTRY_BASE}
          IMAGE_TAG=${IMAGE_TAG}
          # Single external entry point: the nginx reverse-proxy publishes APP_PORT
          # and proxies / -> web-client and /api -> api-gateway on the internal network.
          SPRING_PROFILES_ACTIVE=production
          APP_PORT=80
          GEN_AI_PORT=8000
          LLM_PROVIDER=${LLM_PROVIDER:-openai}
          LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
          LLM_API_KEY=${LLM_API_KEY}
          LOG_LEVEL=INFO
          MONGO_DATABASE=${MONGO_DATABASE:-mydatabase}
          MONGO_ROOT_USERNAME=${MONGO_ROOT_USERNAME}
          MONGO_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
          JWT_RSA_PUBLIC_KEY=${JWT_RSA_PUBLIC_KEY_ONELINE}
          JWT_RSA_PRIVATE_KEY=${JWT_RSA_PRIVATE_KEY_ONELINE}
          SERVICE_CLIENT_SECRET=${SERVICE_CLIENT_SECRET}
          GRAFANA_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
          EOF

      # The stack is deployed through the Azure control plane (az vm run-command)
      # instead of SSH, so the VM needs no inbound SSH access from the runner.
      # Compose files + the rendered .env are base64-embedded into a script that
      # the VM agent executes as root. base64 values contain only [A-Za-z0-9+/=]
      # and the ACR token is a JWT, so they embed safely into shell assignments.
      - name: Build remote deployment script
        env:
          ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
          ACR_TOKEN: ${{ steps.acr.outputs.token }}
        run: |
          umask 077
          COMPOSE_B64="$(base64 -w0 infra/docker-compose.yaml)"
          OVERRIDE_B64="$(base64 -w0 infra/docker-compose.azure.yaml)"
          NGINX_B64="$(base64 -w0 infra/nginx/default.conf)"
          ENV_B64="$(base64 -w0 deploy.env)"
          # docker-compose.yaml's grafana-lgtm service bind-mounts ./grafana/prometheus.yaml,
          # ./grafana/dashboards/*.json, and ./grafana/provisioning/**/*.yaml relative to
          # DEPLOY_DIR — without this, those host paths never exist and Docker's fallback
          # (auto-creating a missing bind source as an empty directory) breaks the mount
          # ("not a directory") the same way it did for the Ansible-deployed path.
          GRAFANA_B64="$(tar -czf - -C infra grafana | base64 -w0)"

          # Header: inject values (expanded) as quoted shell assignments.
          cat > remote-deploy.sh <<EOF
          #!/bin/bash
          set -euo pipefail
          DEPLOY_DIR="${DEPLOY_DIR}"
          ACR_LOGIN_SERVER="${ACR_LOGIN_SERVER}"
          ACR_TOKEN="${ACR_TOKEN}"
          COMPOSE_B64="${COMPOSE_B64}"
          OVERRIDE_B64="${OVERRIDE_B64}"
          NGINX_B64="${NGINX_B64}"
          ENV_B64="${ENV_B64}"
          GRAFANA_B64="${GRAFANA_B64}"
          EOF

          # Body: static logic (quoted heredoc, nothing expanded here).
          cat >> remote-deploy.sh <<'EOF'
          mkdir -p "$DEPLOY_DIR"
          printf '%s' "$COMPOSE_B64"  | base64 -d > "$DEPLOY_DIR/docker-compose.yaml"
          printf '%s' "$OVERRIDE_B64" | base64 -d > "$DEPLOY_DIR/docker-compose.azure.yaml"
          mkdir -p "$DEPLOY_DIR/nginx"
          printf '%s' "$NGINX_B64"    | base64 -d > "$DEPLOY_DIR/nginx/default.conf"
          # Wipe first: self-heals any stale state (including Docker's own directory-autocreation
          # poisoning from a prior failed deploy), same as the Ansible app role's grafana sync.
          rm -rf "$DEPLOY_DIR/grafana"
          printf '%s' "$GRAFANA_B64" | base64 -d | tar -xzf - -C "$DEPLOY_DIR"
          umask 077
          printf '%s' "$ENV_B64" | base64 -d > "$DEPLOY_DIR/.env"
          printf '%s' "$ACR_TOKEN" | docker login "$ACR_LOGIN_SERVER" \
            --username 00000000-0000-0000-0000-000000000000 --password-stdin
          cd "$DEPLOY_DIR"
          LOG=/var/log/rr-deploy.log
          compose() { docker compose --env-file .env -f docker-compose.yaml -f docker-compose.azure.yaml "$@"; }
          compose pull > "$LOG" 2>&1 || { echo "PULL_FAILED"; tail -n 40 "$LOG"; exit 1; }
          compose up -d --remove-orphans >> "$LOG" 2>&1 || { echo "UP_FAILED"; tail -n 40 "$LOG"; exit 1; }
          docker logout "$ACR_LOGIN_SERVER" >/dev/null 2>&1 || true
          docker image prune -f >/dev/null 2>&1 || true
          for i in $(seq 1 12); do
            if curl -fsS "http://127.0.0.1/" >/dev/null 2>&1; then
              echo "DEPLOY_OK reverse-proxy healthy"
              exit 0
            fi
            echo "waiting for reverse-proxy ($i/12)..."
            sleep 10
          done
          echo "HEALTH_FAILED"; compose ps; exit 1
          EOF

      - name: Deploy via az vm run-command
        env:
          RG: ${{ vars.AZURE_RESOURCE_GROUP }}
        run: |
          set -euo pipefail
          VM_NAME="$(az vm list -g "$RG" --query "[0].name" -o tsv)"
          echo "Deploying to VM: $VM_NAME (resource group: $RG)"
          az vm run-command invoke \
            --resource-group "$RG" \
            --name "$VM_NAME" \
            --command-id RunShellScript \
            --scripts "@remote-deploy.sh" \
            --query "value[0].message" -o tsv | tee run-output.txt
          if ! grep -q "DEPLOY_OK" run-output.txt; then
            echo "::error::Deployment did not report success (no DEPLOY_OK marker)"
            exit 1
          fi
          echo "Deployment reported success."
