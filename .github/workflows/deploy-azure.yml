name: Deploy to Azure

# Continuous deployment pipeline:
#   1. build-and-push - build the three application images and push them to
#      Azure Container Registry (ACR).
#   2. deploy         - pull the freshly pushed images onto the Azure VM and
#      (re)start the docker compose stack.
#
# Required configuration is documented in docs/cicd-azure-deploy.md.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-azure-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  IMAGE_NAMESPACE: team-the-rolling-restarts

jobs:
  build-and-push:
    name: Build & push images to ACR
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      registry_base: ${{ steps.meta.outputs.registry_base }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Generate OpenAPI clients
        run: |
          npm ci
          python -m pip install --upgrade pip
          python -m pip install openapi-python-client
          chmod +x api/scripts/gen-all.sh
          ./api/scripts/gen-all.sh

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name "${{ vars.ACR_NAME }}"

      - name: Compute metadata
        id: meta
        run: |
          SHA="${GITHUB_SHA::7}"
          REGISTRY_BASE="${{ vars.ACR_LOGIN_SERVER }}/${IMAGE_NAMESPACE}"
          echo "image_tag=$SHA" >> "$GITHUB_OUTPUT"
          echo "registry_base=$REGISTRY_BASE" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push web-client
        uses: docker/build-push-action@v7.2.0
        with:
          context: ./web-client
          file: ./web-client/Dockerfile
          target: production
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ vars.NEXT_PUBLIC_API_BASE_URL }}
          tags: |
            ${{ steps.meta.outputs.registry_base }}/web-client:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.registry_base }}/web-client:latest
          cache-from: type=gha,scope=web-client
          cache-to: type=gha,mode=max,scope=web-client

      - name: Build & push spring-api
        uses: docker/build-push-action@v7.2.0
        with:
          context: ./services/spring-api
          file: ./services/spring-api/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.registry_base }}/spring-api:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.registry_base }}/spring-api:latest
          cache-from: type=gha,scope=spring-api
          cache-to: type=gha,mode=max,scope=spring-api

      - name: Build & push gen-ai
        uses: docker/build-push-action@v7.2.0
        with:
          context: ./services/gen-ai
          file: ./services/gen-ai/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.registry_base }}/gen-ai:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.registry_base }}/gen-ai:latest
          cache-from: type=gha,scope=gen-ai
          cache-to: type=gha,mode=max,scope=gen-ai

  deploy:
    name: Deploy to Azure VM
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    env:
      REGISTRY_BASE: ${{ needs.build-and-push.outputs.registry_base }}
      IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
      DEPLOY_DIR: ${{ vars.DEPLOY_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Mint short-lived ACR token
        id: acr
        run: |
          TOKEN="$(az acr login --name "${{ vars.ACR_NAME }}" --expose-token --query accessToken -o tsv)"
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Generate deployment .env
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL }}
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          MONGO_DATABASE: ${{ vars.MONGO_DATABASE }}
          MONGO_ROOT_USERNAME: ${{ secrets.MONGO_ROOT_USERNAME }}
          MONGO_ROOT_PASSWORD: ${{ secrets.MONGO_ROOT_PASSWORD }}
          POSTGRES_DB: ${{ vars.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          umask 077
          cat > deploy.env <<EOF
          REGISTRY_BASE=${REGISTRY_BASE}
          IMAGE_TAG=${IMAGE_TAG}
          WEB_CLIENT_PORT=3000
          SPRING_API_PORT=8080
          GEN_AI_PORT=8000
          NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL}
          LLM_PROVIDER=${LLM_PROVIDER:-openai}
          LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
          LLM_API_KEY=${LLM_API_KEY}
          LOG_LEVEL=INFO
          MONGO_DATABASE=${MONGO_DATABASE:-mydatabase}
          MONGO_ROOT_USERNAME=${MONGO_ROOT_USERNAME}
          MONGO_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
          POSTGRES_DB=${POSTGRES_DB:-mydatabase}
          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          EOF

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.AZURE_VM_SSH_PRIVATE_KEY }}
          VM_HOST: ${{ secrets.AZURE_VM_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VM_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copy deployment files to VM
        env:
          VM_HOST: ${{ secrets.AZURE_VM_HOST }}
          VM_USER: ${{ secrets.AZURE_VM_USER }}
        run: |
          REMOTE="${VM_USER}@${VM_HOST}"
          ssh -i ~/.ssh/deploy_key "$REMOTE" "mkdir -p '${DEPLOY_DIR}'"
          scp -i ~/.ssh/deploy_key \
            infra/docker-compose.yaml \
            infra/docker-compose.azure.yaml \
            "$REMOTE:${DEPLOY_DIR}/"
          scp -i ~/.ssh/deploy_key deploy.env "$REMOTE:${DEPLOY_DIR}/.env"

      - name: Deploy stack on VM
        env:
          VM_HOST: ${{ secrets.AZURE_VM_HOST }}
          VM_USER: ${{ secrets.AZURE_VM_USER }}
          ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
          ACR_TOKEN: ${{ steps.acr.outputs.token }}
        run: |
          REMOTE="${VM_USER}@${VM_HOST}"
          ssh -i ~/.ssh/deploy_key "$REMOTE" \
            ACR_LOGIN_SERVER="$ACR_LOGIN_SERVER" \
            ACR_TOKEN="$ACR_TOKEN" \
            DEPLOY_DIR="$DEPLOY_DIR" \
            'bash -s' <<'REMOTE_SCRIPT'
          set -euo pipefail
          echo "$ACR_TOKEN" | docker login "$ACR_LOGIN_SERVER" \
            --username 00000000-0000-0000-0000-000000000000 --password-stdin
          cd "$DEPLOY_DIR"
          docker compose --env-file .env \
            -f docker-compose.yaml -f docker-compose.azure.yaml pull
          docker compose --env-file .env \
            -f docker-compose.yaml -f docker-compose.azure.yaml up -d --remove-orphans
          docker logout "$ACR_LOGIN_SERVER"
          docker image prune -f
          REMOTE_SCRIPT

      - name: Health check
        env:
          VM_HOST: ${{ secrets.AZURE_VM_HOST }}
          VM_USER: ${{ secrets.AZURE_VM_USER }}
        run: |
          REMOTE="${VM_USER}@${VM_HOST}"
          ssh -i ~/.ssh/deploy_key "$REMOTE" 'bash -s' <<'REMOTE_SCRIPT'
          set -euo pipefail
          for i in $(seq 1 12); do
            if curl -fsS "http://127.0.0.1:3000/" >/dev/null; then
              echo "web-client is healthy"
              exit 0
            fi
            echo "Waiting for web-client to become healthy ($i/12)..."
            sleep 10
          done
          echo "Health check failed: web-client did not respond in time" >&2
          exit 1
          REMOTE_SCRIPT
