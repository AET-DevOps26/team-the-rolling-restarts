# TEMPORARY workflow for verifying the Kubernetes deployment from a feature branch.
#
# The real pipeline (deploy_kubernetes.yml) is triggered by `workflow_run` after
# build-and-package, which GitHub only dispatches from the DEFAULT branch (main). Until these
# workflows reach main, that trigger is dormant — so this self-contained workflow builds + pushes
# the images and deploys to the dev cluster directly on push, like deploy-azure.yml does.
#
# Delete this file once the CD workflows are merged to main and the workflow_run path is live.
name: Deploy to Kubernetes (temp)

on:
  push:
    branches: [task/kubernetes_CD]
  workflow_dispatch:

concurrency:
  group: deploy-k8s-temp-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Generate web-client API types from the contract
        run: |
          npm ci
          npx openapi-typescript api/openapi.yaml -o web-client/src/generated/api.ts

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Generate gen-ai API client from the contract
        run: |
          python -m pip install --upgrade pip openapi-python-client
          rm -rf services/gen-ai/generated
          openapi-python-client generate --path api/openapi.yaml \
            --output-path services/gen-ai/generated --overwrite

      - name: Docker login
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute metadata
        id: meta
        run: |
          OWNER="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          REPO="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          PROJECT="${REPO#*/}"
          SHA=${GITHUB_SHA::7}
          echo "owner=$OWNER" >> $GITHUB_OUTPUT
          echo "project=$PROJECT" >> $GITHUB_OUTPUT
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "api_base_url=https://api.rolling-restarts.stud.k8s.aet.cit.tum.de" >> $GITHUB_OUTPUT

      - name: Build web-client
        uses: docker/build-push-action@v7.2.0
        with:
          context: ./web-client
          file: ./web-client/Dockerfile
          target: production
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ steps.meta.outputs.api_base_url }}
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.project }}/web-client:${{ steps.meta.outputs.sha }}
            ghcr.io/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.project }}/web-client:wip

      - name: Build api-gateway
        uses: docker/build-push-action@v7.2.0
        with:
          context: ./services/spring
          file: ./services/spring/api-gateway/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.project }}/api-gateway:${{ steps.meta.outputs.sha }}
            ghcr.io/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.project }}/api-gateway:wip

      - name: Build user-service
        uses: docker/build-push-action@v7.2.0
        with:
          context: ./services/spring
          file: ./services/spring/user-service/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.project }}/user-service:${{ steps.meta.outputs.sha }}
            ghcr.io/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.project }}/user-service:wip

      - name: Build content-service
        uses: docker/build-push-action@v7.2.0
        with:
          context: ./services/spring
          file: ./services/spring/content-service/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.project }}/content-service:${{ steps.meta.outputs.sha }}
            ghcr.io/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.project }}/content-service:wip

      - name: Build gen-ai
        uses: docker/build-push-action@v7.2.0
        with:
          context: ./services/gen-ai
          file: ./services/gen-ai/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.project }}/gen-ai:${{ steps.meta.outputs.sha }}
            ghcr.io/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.project }}/gen-ai:wip

      - name: Generate image values (SHA-pinned)
        run: |
          cat > infra/helm/image-values.yaml <<EOF
          webClient:
            image: ghcr.io/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.project }}/web-client:${{ steps.meta.outputs.sha }}

          apiGateway:
            image: ghcr.io/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.project }}/api-gateway:${{ steps.meta.outputs.sha }}

          userService:
            image: ghcr.io/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.project }}/user-service:${{ steps.meta.outputs.sha }}

          contentService:
            image: ghcr.io/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.project }}/content-service:${{ steps.meta.outputs.sha }}

          genAi:
            image: ghcr.io/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.project }}/gen-ai:${{ steps.meta.outputs.sha }}
          EOF

      - name: Upload image values artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: image-values
          path: infra/helm/image-values.yaml

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    # Feature-branch verification always targets the dev environment/cluster.
    environment: dev
    env:
      HELM_RELEASE: newsgenai
      HELM_CHART: ./infra/helm
      PROFILE: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Download image-values artifact
        uses: actions/download-artifact@v4
        with:
          name: image-values
          path: infra/helm

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_BASE64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Generate secrets values
        env:
          MONGO_ROOT_USERNAME: ${{ secrets.MONGO_ROOT_USERNAME }}
          MONGO_ROOT_PASSWORD: ${{ secrets.MONGO_ROOT_PASSWORD }}
          JWT_RSA_PUBLIC_KEY: ${{ secrets.JWT_RSA_PUBLIC_KEY }}
          JWT_RSA_PRIVATE_KEY: ${{ secrets.JWT_RSA_PRIVATE_KEY }}
        run: |
          umask 077
          python3 -c '
          import os, yaml, sys
          class QuotedStr(str): pass
          yaml.add_representer(QuotedStr, lambda d, v: d.represent_scalar("tag:yaml.org,2002:str", v, style="\""))
          data = {
              "mongodb": {
                  "rootUsername": QuotedStr(os.environ["MONGO_ROOT_USERNAME"]),
                  "rootPassword": QuotedStr(os.environ["MONGO_ROOT_PASSWORD"]),
              },
              "userService": {
                  "jwtKeys": {
                      "publicKey": os.environ["JWT_RSA_PUBLIC_KEY"],
                      "privateKey": os.environ["JWT_RSA_PRIVATE_KEY"],
                  }
              }
          }
          yaml.dump(data, sys.stdout, default_flow_style=False)
          ' > infra/helm/secrets-values.yaml

      - name: Build values file list
        id: values
        run: |
          FILES="-f infra/helm/values.yaml"
          if [[ "${{ env.PROFILE }}" == "prod" ]]; then
            FILES="$FILES -f infra/helm/values-prod.yaml"
          fi
          FILES="$FILES -f infra/helm/secrets-values.yaml"
          FILES="$FILES -f infra/helm/image-values.yaml"
          echo "files=$FILES" >> "$GITHUB_OUTPUT"

      - name: Deploy with Helm
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE }} ${{ env.HELM_CHART }} \
            ${{ steps.values.outputs.files }} \
            --wait --timeout 5m

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/api-gateway --timeout=120s
          kubectl rollout status deployment/user-service --timeout=120s
          kubectl rollout status deployment/content-service --timeout=120s
          kubectl rollout status deployment/web-client --timeout=120s
          kubectl rollout status deployment/gen-ai --timeout=120s
          echo "All deployments rolled out successfully."
