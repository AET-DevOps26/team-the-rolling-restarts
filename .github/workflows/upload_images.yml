name: build-and-package

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Docker login
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        run: |
          OWNER="aet-devops26"
          PROJECT="rolling-restarts"
          SHORT_SHA=${GITHUB_SHA::7}

          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            CHANNEL="main"
          elif [[ "${GITHUB_REF_NAME}" == "dev" ]]; then
            CHANNEL="dev"
          else
            CHANNEL="wip"
          fi

          echo "owner=$OWNER" >> $GITHUB_OUTPUT
          echo "project=$PROJECT" >> $GITHUB_OUTPUT
          echo "sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT

      # ---------------- WEB CLIENT ----------------
      - name: Build web-client
        uses: docker/build-push-action@v7.2.0
        with:
          context: ./web-client
          file: ./web-client/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.project }}/web-client:${{ steps.meta.outputs.sha }}
            ghcr.io/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.project }}/web-client:${{ steps.meta.outputs.channel }}

      # ---------------- SPRING API ----------------
      - name: Build spring-api
        uses: docker/build-push-action@v7.2.0
        with:
          context: ./services/spring-api
          file: ./services/spring-api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.project }}/spring-api:${{ steps.meta.outputs.sha }}
            ghcr.io/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.project }}/spring-api:${{ steps.meta.outputs.channel }}

      # ---------------- GEN AI ----------------
      - name: Build gen-ai
        uses: docker/build-push-action@v7.2.0
        with:
          context: ./services/gen-ai
          file: ./services/gen-ai/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.project }}/gen-ai:${{ steps.meta.outputs.sha }}
            ghcr.io/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.project }}/gen-ai:${{ steps.meta.outputs.channel }}

      # ---------------- HELM VALUES (SHA ONLY) ----------------
      - name: Generate Helm values
        run: |
          OWNER="aet-devops26"
          PROJECT="rolling-restarts"
          SHA=${GITHUB_SHA::7}

          cat > helm-values.yaml <<EOF
          webClient:
            image: ghcr.io/${OWNER}/${PROJECT}/web-client:${SHA}

          springApi:
            image: ghcr.io/${OWNER}/${PROJECT}/spring-api:${SHA}

          genAi:
            image: ghcr.io/${OWNER}/${PROJECT}/gen-ai:${SHA}
          EOF

      - name: Upload Helm artifact
        uses: actions/upload-artifact@v4
        with:
          name: helm-values
          path: helm-values.yaml