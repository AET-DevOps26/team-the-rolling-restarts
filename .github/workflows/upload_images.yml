name: build-and-package

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Generate OpenAPI clients
        run: |
          pip install openapi-python-client
          chmod +x api/scripts/gen-all.sh
          ./api/scripts/gen-all.sh

      - name: Docker login
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ---------------- Compute dynamic metadata ----------------
      - name: Compute metadata
        id: meta
        run: |
          OWNER_RAW="${GITHUB_REPOSITORY_OWNER}"
          OWNER="$(echo "$OWNER_RAW" | tr '[:upper:]' '[:lower:]')"

          REPO_RAW="${GITHUB_REPOSITORY}"   # owner/repo
          REPO="$(echo "$REPO_RAW" | tr '[:upper:]' '[:lower:]')"

          PROJECT="${REPO#*/}"
          SHA=${GITHUB_SHA::7}
          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            CHANNEL="main"
          elif [[ "${GITHUB_REF_NAME}" == "dev" ]]; then
            CHANNEL="dev"
          else
            CHANNEL="wip"
          fi

          echo "owner=$OWNER" >> $GITHUB_OUTPUT
          echo "project=$PROJECT" >> $GITHUB_OUTPUT
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT
          echo "api_base_url=https://api.rolling-restarts.stud.k8s.aet.cit.tum.de" >> $GITHUB_OUTPUT

      # ---------------- WEB CLIENT (temporarily disabled) ----------------
      - name: Build web-client
        uses: docker/build-push-action@v7.2.0
        with:
          context: ./web-client
          file: ./web-client/Dockerfile
          target: production
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ steps.meta.outputs.api_base_url }}
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.project }}/web-client:${{ steps.meta.outputs.sha }}
            ghcr.io/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.project }}/web-client:${{ steps.meta.outputs.channel }}

      # ---------------- API GATEWAY ----------------
      - name: Build api-gateway
        uses: docker/build-push-action@v7.2.0
        with:
          context: ./services/spring
          file: ./services/spring/api-gateway/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.project }}/api-gateway:${{ steps.meta.outputs.sha }}
            ghcr.io/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.project }}/api-gateway:${{ steps.meta.outputs.channel }}

      # ---------------- USER SERVICE ----------------
      - name: Build user-service
        uses: docker/build-push-action@v7.2.0
        with:
          context: ./services/spring
          file: ./services/spring/user-service/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.project }}/user-service:${{ steps.meta.outputs.sha }}
            ghcr.io/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.project }}/user-service:${{ steps.meta.outputs.channel }}

      # ---------------- CONTENT SERVICE ----------------
      - name: Build content-service
        uses: docker/build-push-action@v7.2.0
        with:
          context: ./services/spring
          file: ./services/spring/content-service/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.project }}/content-service:${{ steps.meta.outputs.sha }}
            ghcr.io/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.project }}/content-service:${{ steps.meta.outputs.channel }}

      # ---------------- GEN AI (temporarily disabled) ----------------
      - name: Build gen-ai
        uses: docker/build-push-action@v7.2.0
        with:
          context: ./services/gen-ai
          file: ./services/gen-ai/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.project }}/gen-ai:${{ steps.meta.outputs.sha }}
            ghcr.io/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.project }}/gen-ai:${{ steps.meta.outputs.channel }}

      # ---------------- IMAGE VALUES (SHA ONLY) ----------------
      - name: Generate image values
        run: |
          cat > infra/helm/image-values.yaml <<EOF
          webClient:
            image: ghcr.io/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.project }}/web-client:${{ steps.meta.outputs.sha }}

          apiGateway:
            image: ghcr.io/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.project }}/api-gateway:${{ steps.meta.outputs.sha }}

          userService:
            image: ghcr.io/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.project }}/user-service:${{ steps.meta.outputs.sha }}

          contentService:
            image: ghcr.io/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.project }}/content-service:${{ steps.meta.outputs.sha }}

          genAi:
            image: ghcr.io/${{ steps.meta.outputs.owner }}/${{ steps.meta.outputs.project }}/gen-ai:${{ steps.meta.outputs.sha }}
          EOF

      - name: Upload image values artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: image-values
          path: infra/helm/image-values.yaml
