name: build-and-package

on:
  push:
  workflow_dispatch:

concurrency:
  group: build-and-package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------- Phase 1: generate client code + compute tags ----------
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      owner: ${{ steps.meta.outputs.owner }}
      project: ${{ steps.meta.outputs.project }}
      sha: ${{ steps.meta.outputs.sha }}
      channel: ${{ steps.meta.outputs.channel }}

    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Generate web-client API types from the contract
        run: |
          npm ci
          npx openapi-typescript api/openapi.yaml -o web-client/src/generated/api.ts

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.12'

      - name: Generate gen-ai API client from the contract
        run: |
          python -m pip install --upgrade pip openapi-python-client
          rm -rf services/gen-ai/generated
          openapi-python-client generate --path api/openapi.yaml \
            --output-path services/gen-ai/generated --overwrite

      - name: Upload generated sources
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: generated-sources
          path: |
            web-client/src/generated/
            services/gen-ai/generated/

      - name: Compute metadata
        id: meta
        run: |
          OWNER="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          REPO="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          PROJECT="${REPO#*/}"
          SHA=${GITHUB_SHA::7}
          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            CHANNEL="main"
          elif [[ "${GITHUB_REF_NAME}" == "dev" ]]; then
            CHANNEL="dev"
          else
            CHANNEL="wip"
          fi
          echo "owner=$OWNER" >> $GITHUB_OUTPUT
          echo "project=$PROJECT" >> $GITHUB_OUTPUT
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT

  # ---------- Phase 2a: build & push the backend services in parallel ----------
  # Java/Python build fine under QEMU emulation, so these stay on a single amd64 runner
  # building both platforms via buildx + QEMU.
  build-backend:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-gateway
            context: ./services/spring
            file: ./services/spring/api-gateway/Dockerfile
            needs-generated: false
          - service: user-service
            context: ./services/spring
            file: ./services/spring/user-service/Dockerfile
            needs-generated: false
          - service: content-service
            context: ./services/spring
            file: ./services/spring/content-service/Dockerfile
            needs-generated: false
          - service: gen-ai
            context: ./services/gen-ai
            file: ./services/gen-ai/Dockerfile
            needs-generated: true

    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false

      - name: Download generated sources
        if: matrix.needs-generated
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: generated-sources

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4
        with:
          cache-image: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Docker login
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          tags: |
            ghcr.io/${{ needs.prepare.outputs.owner }}/${{ needs.prepare.outputs.project }}/${{ matrix.service }}:${{ needs.prepare.outputs.sha }}
            ghcr.io/${{ needs.prepare.outputs.owner }}/${{ needs.prepare.outputs.project }}/${{ matrix.service }}:${{ needs.prepare.outputs.channel }}

  # ---------- Phase 2b: build web-client natively per-arch ----------
  # Next.js's native SWC compiler binary crashes with SIGILL under QEMU's arm64 emulation, so
  # web-client cannot use the QEMU path the backend services use. Build each platform natively
  # on a matching runner instead (GitHub's hosted ubuntu-24.04-arm is free for public repos),
  # tagged per-arch, then merge into one multi-arch manifest in the next phase.
  build-web-client:
    needs: prepare
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          persist-credentials: false

      - name: Download generated sources
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: generated-sources

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Docker login
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web-client (${{ matrix.arch }})
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./web-client
          file: ./web-client/Dockerfile
          target: production
          platforms: linux/${{ matrix.arch }}
          push: true
          cache-from: type=gha,scope=web-client-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=web-client-${{ matrix.arch }}
          tags: |
            ghcr.io/${{ needs.prepare.outputs.owner }}/${{ needs.prepare.outputs.project }}/web-client:${{ needs.prepare.outputs.sha }}-${{ matrix.arch }}

  # ---------- Phase 2c: merge the per-arch web-client images into one manifest ----------
  merge-web-client:
    needs: [prepare, build-web-client]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Docker login
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        env:
          OWNER: ${{ needs.prepare.outputs.owner }}
          PROJECT: ${{ needs.prepare.outputs.project }}
          SHA: ${{ needs.prepare.outputs.sha }}
          CHANNEL: ${{ needs.prepare.outputs.channel }}
        run: |
          IMAGE="ghcr.io/${OWNER}/${PROJECT}/web-client"
          docker buildx imagetools create \
            -t "${IMAGE}:${SHA}" \
            -t "${IMAGE}:${CHANNEL}" \
            "${IMAGE}:${SHA}-amd64" \
            "${IMAGE}:${SHA}-arm64"

  # ---------- Phase 3: emit Helm image-values artifact ----------
  finalize:
    needs: [prepare, build-backend, merge-web-client]
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Generate image values
        env:
          OWNER: ${{ needs.prepare.outputs.owner }}
          PROJECT: ${{ needs.prepare.outputs.project }}
          SHA: ${{ needs.prepare.outputs.sha }}
        run: |
          PREFIX="ghcr.io/${OWNER}/${PROJECT}"
          cat > image-values.yaml <<EOF
          webClient:
            image: ${PREFIX}/web-client:${SHA}

          apiGateway:
            image: ${PREFIX}/api-gateway:${SHA}

          userService:
            image: ${PREFIX}/user-service:${SHA}

          contentService:
            image: ${PREFIX}/content-service:${SHA}

          genAi:
            image: ${PREFIX}/gen-ai:${SHA}
          EOF

      - name: Upload image values artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: image-values
          path: image-values.yaml
