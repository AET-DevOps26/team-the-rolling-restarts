name: build-and-package

on:
  push:
  workflow_dispatch:

concurrency:
  group: build-and-package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------- Phase 1: generate client code + compute tags ----------
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      owner: ${{ steps.meta.outputs.owner }}
      project: ${{ steps.meta.outputs.project }}
      sha: ${{ steps.meta.outputs.sha }}
      channel: ${{ steps.meta.outputs.channel }}
      api_base_url: ${{ steps.meta.outputs.api_base_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Generate web-client API types from the contract
        run: |
          npm ci
          npx openapi-typescript api/openapi.yaml -o web-client/src/generated/api.ts

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Generate gen-ai API client from the contract
        run: |
          python -m pip install --upgrade pip openapi-python-client
          rm -rf services/gen-ai/generated
          openapi-python-client generate --path api/openapi.yaml \
            --output-path services/gen-ai/generated --overwrite

      - name: Upload generated sources
        uses: actions/upload-artifact@v7.0.1
        with:
          name: generated-sources
          path: |
            web-client/src/generated/
            services/gen-ai/generated/

      - name: Compute metadata
        id: meta
        run: |
          OWNER="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          REPO="$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          PROJECT="${REPO#*/}"
          SHA=${GITHUB_SHA::7}
          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            CHANNEL="main"
          elif [[ "${GITHUB_REF_NAME}" == "dev" ]]; then
            CHANNEL="dev"
          else
            CHANNEL="wip"
          fi
          echo "owner=$OWNER" >> $GITHUB_OUTPUT
          echo "project=$PROJECT" >> $GITHUB_OUTPUT
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT
          echo "api_base_url=https://api.rolling-restarts.stud.k8s.aet.cit.tum.de" >> $GITHUB_OUTPUT

  # ---------- Phase 2: build & push each service in parallel ----------
  build:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: web-client
            context: ./web-client
            file: ./web-client/Dockerfile
            target: production
            build-args: NEXT_PUBLIC_API_BASE_URL=${{ needs.prepare.outputs.api_base_url }}
            needs-generated: true
          - service: api-gateway
            context: ./services/spring
            file: ./services/spring/api-gateway/Dockerfile
            needs-generated: false
          - service: user-service
            context: ./services/spring
            file: ./services/spring/user-service/Dockerfile
            needs-generated: false
          - service: content-service
            context: ./services/spring
            file: ./services/spring/content-service/Dockerfile
            needs-generated: false
          - service: gen-ai
            context: ./services/gen-ai
            file: ./services/gen-ai/Dockerfile
            needs-generated: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Download generated sources
        if: matrix.needs-generated
        uses: actions/download-artifact@v4
        with:
          name: generated-sources

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker login
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v7.2.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          target: ${{ matrix.target || '' }}
          platforms: linux/amd64,linux/arm64
          push: true
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          build-args: ${{ matrix.build-args || '' }}
          tags: |
            ghcr.io/${{ needs.prepare.outputs.owner }}/${{ needs.prepare.outputs.project }}/${{ matrix.service }}:${{ needs.prepare.outputs.sha }}
            ghcr.io/${{ needs.prepare.outputs.owner }}/${{ needs.prepare.outputs.project }}/${{ matrix.service }}:${{ needs.prepare.outputs.channel }}

  # ---------- Phase 3: emit Helm image-values artifact ----------
  finalize:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Generate image values
        run: |
          PREFIX="ghcr.io/${{ needs.prepare.outputs.owner }}/${{ needs.prepare.outputs.project }}"
          SHA="${{ needs.prepare.outputs.sha }}"
          cat > image-values.yaml <<EOF
          webClient:
            image: ${PREFIX}/web-client:${SHA}

          apiGateway:
            image: ${PREFIX}/api-gateway:${SHA}

          userService:
            image: ${PREFIX}/user-service:${SHA}

          contentService:
            image: ${PREFIX}/content-service:${SHA}

          genAi:
            image: ${PREFIX}/gen-ai:${SHA}
          EOF

      - name: Upload image values artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: image-values
          path: image-values.yaml
