name: Build PlantUML Diagrams

on:
  push:
    paths:
      - '**/*.puml'
      - '.github/workflows/generate_uml_diagrams.yml'

  pull_request:
    paths:
      - '**/*.puml'
      - '.github/workflows/generate_uml_diagrams.yml'

  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-diagrams:
    runs-on: ubuntu-24.04

    container:
      image: plantuml/plantuml:1.2026.1

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Generate PNG diagrams
        shell: bash
        run: |
          set -e

          OUT=generated-diagrams
          rm -rf "$OUT"
          mkdir -p "$OUT"

          # Generate PNGs for all .puml files
          find . -name '*.puml' -print0 | while IFS= read -r -d '' f; do
            echo "Generating: $f"
            java -jar /opt/plantuml.jar -tpng "$f"
          done

          # Copy generated PNGs into artifact directory
          find . -name '*.png' -print0 | while IFS= read -r -d '' p; do
            dest="$OUT/${p#./}"
            mkdir -p "$(dirname "$dest")"
            cp "$p" "$dest"
          done

          echo "PNG files in artifact directory:"
          find "$OUT" -name '*.png'

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: diagrams-${{ github.run_id }}-${{ github.run_attempt }}
          path: generated-diagrams
          retention-days: 30