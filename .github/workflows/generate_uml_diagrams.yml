name: Build PlantUML Diagrams

on:
  push:
    paths:
      - '**/*.puml'
  pull_request:
    paths:
      - '**/*.puml'
  workflow_dispatch:

jobs:
  build-diagrams:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed .puml files (added/modified/renamed)
        uses: tj-actions/changed-files@v44
        id: changed
        with:
          files: |
            **/*.puml
          since_last_remote_commit: true

      - name: Install PlantUML
        run: |
          sudo apt-get update
          sudo apt-get install -y plantuml

      - name: Generate diagrams
        run: |
          echo "Files: ${{ steps.changed.outputs.all_changed_files }}"

          for file in ${{ steps.changed.outputs.all_changed_files }}; do
            if [[ -f "$file" && "$file" == *.puml ]]; then
              dir=$(dirname "$file")
              out="$dir/generated_diagrams"
              mkdir -p "$out"
              plantuml -outputDir "$out" "$file"
            fi
          done

      - name: Upload artifacts
        if: hashFiles('**/generated_diagrams/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: diagrams
          path: '**/generated_diagrams'
