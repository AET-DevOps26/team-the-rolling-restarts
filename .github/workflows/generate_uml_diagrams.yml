name: Build PlantUML Diagrams

on:
  push:
    paths:
      - '**/*.puml'
  pull_request:
    paths:
      - '**/*.puml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-diagrams:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Debug workspace (list .puml files)
        shell: bash
        run: |
          set -euo pipefail
          echo "GITHUB_REF=$GITHUB_REF"
          echo "GITHUB_SHA=$GITHUB_SHA"
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          echo "Repo root listing:"
          ls -la
          echo "All .puml files:"
          find . -type f -name '*.puml' -print

      - name: Install PlantUML
        run: |
          sudo apt-get update
          sudo apt-get install -y plantuml

      - name: Generate diagrams (PNG) for all .puml files (mirrored structure)
        shell: bash
        run: |
          set -euo pipefail

          OUT_ROOT="generated-diagrams"
          rm -rf "$OUT_ROOT"
          mkdir -p "$OUT_ROOT"

          # Restrict search to tracked files to avoid surprises with untracked build output,
          # and to make behavior consistent across local vs CI.
          mapfile -d '' files < <(
            git ls-files -z -- '*.puml' || true
          )

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No .puml files found (git ls-files)."
            echo "This usually means the .puml files are not committed on this ref."
            exit 1
          fi

          echo "Found ${#files[@]} .puml files"
          for file in "${files[@]}"; do
            rel_dir="$(dirname "$file")"
            out_dir="$OUT_ROOT/$rel_dir"
            mkdir -p "$out_dir"
            plantuml -tpng -outputDir "$out_dir" "$file"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: diagrams-${{ github.ref_name }}-${{ github.sha }}
          path: generated-diagrams
          retention-days: 30
