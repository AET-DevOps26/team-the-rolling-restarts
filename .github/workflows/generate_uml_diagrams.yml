name: Build PlantUML Diagrams

on:
  push:
    paths:
      - '**/*.puml'
  pull_request:
    paths:
      - '**/*.puml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-diagrams:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed .puml files (added/modified/renamed)
        uses: tj-actions/changed-files@v44
        id: changed
        with:
          files: |
            **/*.puml

      - name: Install PlantUML
        run: |
          sudo apt-get update
          sudo apt-get install -y plantuml

      - name: Generate diagrams (PNG)
        if: steps.changed.outputs.any_changed == 'true'
        run: |
          echo "Files: ${{ steps.changed.outputs.all_changed_files }}"

          for file in ${{ steps.changed.outputs.all_changed_files }}; do
            if [[ -f "$file" && "$file" == *.puml ]]; then
              dir=$(dirname "$file")
              out="$dir/generated_diagram"
              mkdir -p "$out"
              plantuml -tpng -outputDir "$out" "$file"
            fi
          done

      - name: Upload artifacts
        if: hashFiles('**/generated_diagram/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: diagrams
          path: '**/generated_diagram'

      - name: Commit and push generated diagrams
        if: github.event_name != 'pull_request' && hashFiles('**/generated_diagram/**') != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add '**/generated_diagram'

          if git diff --cached --quiet; then
            echo "No diagram changes to commit."
            exit 0
          fi

          git commit -m "chore(uml): auto-generate PlantUML diagrams"
          git push
