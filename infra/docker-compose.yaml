name: rolling-restarts

services:
  web-client:
    build:
      context: ../web-client
      dockerfile: Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
    restart: unless-stopped
    ports:
      - "${WEB_CLIENT_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - frontend

  api-gateway:
    build:
      context: ../services/spring
      dockerfile: api-gateway/Dockerfile
    restart: unless-stopped
    ports:
      - "${API_GATEWAY_PORT:-8080}:8080"
    environment:
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
      USER_SERVICE_URL: http://user-service:8081
      CONTENT_SERVICE_URL: http://content-service:8082
      JWT_ISSUER_URI: http://user-service:8081
    healthcheck:
      test:
        - CMD
        - /usr/bin/wget
        - -q
        - --spider
        - http://localhost:8080/actuator/health
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      user-service:
        condition: service_healthy
      content-service:
        condition: service_healthy
    networks:
      - frontend
      - backend

  user-service:
    build:
      context: ../services/spring
      dockerfile: user-service/Dockerfile
    restart: unless-stopped
    ports:
      - "${USER_SERVICE_PORT:-8081}:8081"
    environment:
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
      SPRING_MONGODB_URI: mongodb://${MONGO_ROOT_USERNAME:-root}:${MONGO_ROOT_PASSWORD:-secret}@mongodb:27017/users?authSource=admin
    healthcheck:
      test:
        - CMD
        - /usr/bin/wget
        - -q
        - --spider
        - http://localhost:8081/actuator/health
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - backend

  content-service:
    build:
      context: ../services/spring
      dockerfile: content-service/Dockerfile
    restart: unless-stopped
    ports:
      - "${CONTENT_SERVICE_PORT:-8082}:8082"
    environment:
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
      SPRING_MONGODB_URI: mongodb://${MONGO_ROOT_USERNAME:-root}:${MONGO_ROOT_PASSWORD:-secret}@mongodb:27017/content?authSource=admin
      JWT_ISSUER_URI: http://user-service:8081
    healthcheck:
      test:
        - CMD
        - /usr/bin/wget
        - -q
        - --spider
        - http://localhost:8082/actuator/health
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      mongodb:
        condition: service_healthy
      user-service:
        condition: service_healthy
    networks:
      - backend

  gen-ai:
    build:
      context: ../services/gen-ai
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${GEN_AI_PORT:-8000}:8000"
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://localhost:8000/health")
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - backend

  mongodb:
    image: mongo:8
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-mydatabase}
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-secret}
    healthcheck:
      test:
        - CMD-SHELL
        - mongosh --quiet --host localhost --port 27017 --username ${MONGO_ROOT_USERNAME:-root} --password ${MONGO_ROOT_PASSWORD:-secret} --authenticationDatabase admin --eval "db.adminCommand('ping').ok" admin | grep 1 >/dev/null
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - mongodb-data:/data/db
    networks:
      - backend

  grafana-lgtm:
    image: grafana/otel-lgtm@sha256:10f48eb2f8670134df542177bb19536c55421b089e43f9dfc2a27d4c078204d8
    restart: unless-stopped
    ports:
      - "${LGTM_GRAFANA_PORT:-3001}:3000"
      - "${LGTM_OTLP_GRPC_PORT:-4317}:4317"
      - "${LGTM_OTLP_HTTP_PORT:-4318}:4318"
    networks:
      - backend

volumes:
  mongodb-data:

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
