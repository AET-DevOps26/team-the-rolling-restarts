name: rolling-restarts

services:
  web-client:
    build:
      context: ../web-client
      dockerfile: Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_BASE_URL: ""
    image: ${REGISTRY:-ghcr.io/aet-devops26/team-the-rolling-restarts}/web-client:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
    networks:
      - frontend

  reverse-proxy:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api-gateway:
        condition: service_healthy
      web-client:
        condition: service_started
    networks:
      - frontend

  api-gateway:
    build:
      context: ../services/spring
      dockerfile: api-gateway/Dockerfile
    image: ${REGISTRY:-ghcr.io/aet-devops26/team-the-rolling-restarts}/api-gateway:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
      USER_SERVICE_URL: http://user-service:8081
      CONTENT_SERVICE_URL: http://content-service:8082
      GEN_AI_URL: http://gen-ai:8000
      JWT_ISSUER_URI: http://user-service:8081
    healthcheck:
      test:
        - CMD
        - /usr/bin/wget
        - -q
        - --spider
        - http://localhost:8080/actuator/health
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      user-service:
        condition: service_healthy
      content-service:
        condition: service_healthy
    networks:
      - frontend
      - backend

  user-service:
    build:
      context: ../services/spring
      dockerfile: user-service/Dockerfile
    image: ${REGISTRY:-ghcr.io/aet-devops26/team-the-rolling-restarts}/user-service:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${USER_SERVICE_PORT:-8081}:8081"
    environment:
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
