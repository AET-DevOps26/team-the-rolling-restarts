name: rolling-restarts

services:
  web-client:
    build:
      context: ../web-client
      dockerfile: Dockerfile
      target: production
    image: ${REGISTRY:-ghcr.io/aet-devops26/team-the-rolling-restarts}/web-client:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # Server-side fetches run inside the container; use the internal proxy, not localhost.
      # Not NEXT_PUBLIC_-prefixed (see web-client/src/lib/api/client.ts) so this is read at
      # container runtime, not baked into the image at build time — the same image works
      # correctly across every deployment target this way.
      API_BASE_URL: http://reverse-proxy
      OTEL_EXPORTER_OTLP_ENDPOINT: http://grafana-lgtm:4318
      OTEL_SERVICE_NAME: web-client
    networks:
      - frontend

  reverse-proxy:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api-gateway:
        condition: service_healthy
      web-client:
        condition: service_started
    networks:
      - frontend

  api-gateway:
    build:
      context: ../services/spring
      dockerfile: api-gateway/Dockerfile
    image: ${REGISTRY:-ghcr.io/aet-devops26/team-the-rolling-restarts}/api-gateway:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
      USER_SERVICE_URL: http://user-service:8081
      CONTENT_SERVICE_URL: http://content-service:8082
      GEN_AI_URL: http://gen-ai:8000
      JWT_ISSUER_URI: http://user-service:8081
      MANAGEMENT_OTLP_METRICS_EXPORT_URL: http://grafana-lgtm:4318/v1/metrics
      MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT: http://grafana-lgtm:4318/v1/traces
      MANAGEMENT_OPENTELEMETRY_LOGGING_EXPORT_OTLP_ENDPOINT: http://grafana-lgtm:4318/v1/logs
      # Comma-separated allowed CORS origins. Declared here so a value set in .env reaches the
      # container; empty by default (gateway fails closed). The dev override sets '*'.
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
    healthcheck:
      test:
        - CMD
        - /usr/bin/wget
        - -q
        - --spider
        - http://localhost:8080/actuator/health
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      user-service:
        condition: service_healthy
      content-service:
        condition: service_healthy
    networks:
      - frontend
      - backend

  user-service:
    build:
      context: ../services/spring
      dockerfile: user-service/Dockerfile
    image: ${REGISTRY:-ghcr.io/aet-devops26/team-the-rolling-restarts}/user-service:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${USER_SERVICE_PORT:-8081}:8081"
    environment:
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
      SPRING_MONGODB_URI: mongodb://${MONGO_ROOT_USERNAME:-root}:${MONGO_ROOT_PASSWORD:-secret}@mongodb:27017/users?authSource=admin
      JWT_ISSUER: http://user-service:8081
      JWT_RSA_PUBLIC_KEY: ${JWT_RSA_PUBLIC_KEY}
      JWT_RSA_PRIVATE_KEY: ${JWT_RSA_PRIVATE_KEY}
      CONTENT_SERVICE_URL: http://content-service:8082
      # Secret for the client_credentials token used to call content-service's subscribe/unsubscribe
      # endpoints (scope source.write). Override SERVICE_CLIENT_SECRET in production.
      SERVICE_CLIENT_SECRET: ${SERVICE_CLIENT_SECRET}
      MANAGEMENT_OTLP_METRICS_EXPORT_URL: http://grafana-lgtm:4318/v1/metrics
      MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT: http://grafana-lgtm:4318/v1/traces
      MANAGEMENT_OPENTELEMETRY_LOGGING_EXPORT_OTLP_ENDPOINT: http://grafana-lgtm:4318/v1/logs
    healthcheck:
      test:
        - CMD
        - /usr/bin/wget
        - -q
        - --spider
        - http://localhost:8081/actuator/health
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - backend

  content-service:
    build:
      context: ../services/spring
      dockerfile: content-service/Dockerfile
    image: ${REGISTRY:-ghcr.io/aet-devops26/team-the-rolling-restarts}/content-service:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${CONTENT_SERVICE_PORT:-8082}:8082"
    environment:
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
      SPRING_MONGODB_URI: mongodb://${MONGO_ROOT_USERNAME:-root}:${MONGO_ROOT_PASSWORD:-secret}@mongodb:27017/content?authSource=admin
      JWT_ISSUER_URI: http://user-service:8081
      MANAGEMENT_OTLP_METRICS_EXPORT_URL: http://grafana-lgtm:4318/v1/metrics
      MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT: http://grafana-lgtm:4318/v1/traces
      MANAGEMENT_OPENTELEMETRY_LOGGING_EXPORT_OTLP_ENDPOINT: http://grafana-lgtm:4318/v1/logs
    healthcheck:
      test:
        - CMD
        - /usr/bin/wget
        - -q
        - --spider
        - http://localhost:8082/actuator/health
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      mongodb:
        condition: service_healthy
      user-service:
        condition: service_healthy
    networks:
      - backend

  gen-ai:
    build:
      context: ../services/gen-ai
      dockerfile: Dockerfile
    image: ${REGISTRY:-ghcr.io/aet-devops26/team-the-rolling-restarts}/gen-ai:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "${GEN_AI_PORT:-8000}:8000"
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-logos}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://logos.aet.cit.tum.de/v1}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-openai/gpt-oss-120b}
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://api-gateway:8080}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://grafana-lgtm:4318
      OTEL_SERVICE_NAME: gen-ai
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://localhost:8000/health")
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - backend

  mongodb:
    image: mongo:8
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-mydatabase}
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-secret}
    healthcheck:
      test:
        - CMD-SHELL
        - mongosh --quiet --host localhost --port 27017 --username ${MONGO_ROOT_USERNAME:-root} --password ${MONGO_ROOT_PASSWORD:-secret} --authenticationDatabase admin --eval "db.adminCommand('ping').ok" admin | grep 1 >/dev/null
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - mongodb-data:/data/db
    networks:
      - backend

  ollama:
    image: ollama/ollama:latest
    profiles: ["local-llm"]
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - backend

  # One-shot: makes the deployed password the actual source of truth instead of a first-boot-only
  # default. Compose has no init-container concept, so this is a separate service sharing the same
  # volume, gated by `condition: service_completed_successfully` below. `grafana cli admin
  # reset-admin-password` is idempotent either way: on a fresh volume it runs the same migrations
  # `grafana server` would (creating the default admin/org) then sets the password; on an existing
  # volume it just resets it. Runs before the main service starts, so there's no live-server
  # stale-cache race (confirmed live: running the same command via `docker exec` against an
  # already-running server updated the DB file but the server kept serving the old password until
  # restarted).
  grafana-lgtm-set-admin-password:
    image: grafana/otel-lgtm@sha256:10f48eb2f8670134df542177bb19536c55421b089e43f9dfc2a27d4c078204d8
    restart: "no"
    entrypoint: sh
    command:
      - -c
      - |
        cd /otel-lgtm/grafana && \
        GF_PATHS_HOME=/data/grafana GF_PATHS_DATA=/data/grafana/data GF_PATHS_PLUGINS=/data/grafana/plugins \
        ./bin/grafana cli admin reset-admin-password "$$GF_SECURITY_ADMIN_PASSWORD"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana-lgtm-data:/data
    networks:
      - backend

  grafana-lgtm:
    image: grafana/otel-lgtm@sha256:10f48eb2f8670134df542177bb19536c55421b089e43f9dfc2a27d4c078204d8
    restart: unless-stopped
    depends_on:
      grafana-lgtm-set-admin-password:
        condition: service_completed_successfully
    ports:
      - "${LGTM_GRAFANA_PORT:-3001}:3000"
      - "${LGTM_OTLP_GRPC_PORT:-4317}:4317"
      - "${LGTM_OTLP_HTTP_PORT:-4318}:4318"
    environment:
      # The base grafana/otel-lgtm image's own run-grafana.sh defaults GF_AUTH_ANONYMOUS_ENABLED
      # to "true" with org role "Admin" — without this override, anyone hitting /monitoring gets
      # full admin access with no login at all. The admin password itself is set by the
      # grafana-lgtm-set-admin-password service above, not by GF_SECURITY_ADMIN_USER/PASSWORD here
      # — those only ever apply at the same first-boot moment that service already handles
      # idempotently, so they're omitted here to avoid a second, silently-inert mechanism.
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      # Grafana is reachable both directly (LGTM_GRAFANA_PORT, unchanged) and via the reverse
      # proxy's /monitoring path (infra/nginx/default.conf). These two make it aware it's also
      # served from that sub-path so its own asset/API links resolve correctly through the proxy.
      # The domain in ROOT_URL only affects absolute links Grafana itself generates (e.g. any
      # future SSO redirect) — it doesn't need to match the real host for basic dashboard use.
      GF_SERVER_ROOT_URL: http://localhost/monitoring/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      # Email alert delivery. GRAFANA_ALERT_EMAILS is read directly by
      # provisioning/alerting/contactpoints.yaml via Grafana's own $__env{} expansion, not by this
      # env block — it's listed here only so `docker compose config` and `.env.example` document
      # every var this stack actually consumes in one place.
      GF_SMTP_ENABLED: "true"
      GF_SMTP_HOST: ${GF_SMTP_HOST:-smtp.gmail.com:587}
      GF_SMTP_USER: ${GRAFANA_SMTP_USER:-}
      GF_SMTP_PASSWORD: ${GRAFANA_SMTP_PASSWORD:-}
      GF_SMTP_FROM_ADDRESS: ${GRAFANA_SMTP_USER:-}
      GF_SMTP_FROM_NAME: Grafana Alerting
      GRAFANA_ALERT_EMAILS: ${GRAFANA_ALERT_EMAILS:-}
    volumes:
      - grafana-lgtm-data:/data
      - ./grafana/prometheus.yaml:/otel-lgtm/prometheus.yaml:ro
      - ./grafana/dashboards/service-overview.json:/otel-lgtm/grafana-dashboards-custom/service-overview.json:ro
      - ./grafana/dashboards/red-metrics-classic.json:/otel-lgtm/grafana-dashboards-custom/red-metrics-classic.json:ro
      - ./grafana/dashboards/genai-overview.json:/otel-lgtm/grafana-dashboards-custom/genai-overview.json:ro
      - ./grafana/dashboards/webclient-overview.json:/otel-lgtm/grafana-dashboards-custom/webclient-overview.json:ro
      - ./grafana/provisioning/dashboards/custom-dashboards.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/custom-dashboards.yaml:ro
      - ./grafana/provisioning/dashboards/default-dashboards-override.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/grafana-dashboards.yaml:ro
      - ./grafana/provisioning/alerting/rules.yaml:/otel-lgtm/grafana/conf/provisioning/alerting/rules.yaml:ro
      - ./grafana/provisioning/alerting/contactpoints.yaml:/otel-lgtm/grafana/conf/provisioning/alerting/contactpoints.yaml:ro
    networks:
      - backend
      - frontend

volumes:
  mongodb-data:
  ollama-models:
  grafana-lgtm-data:

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
