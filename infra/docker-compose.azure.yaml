# Azure deployment override.
#
# Used by the `deploy-azure` GitHub Actions workflow to run the stack on the
# Azure VM from images pulled from Azure Container Registry (ACR) instead of
# building from source on the host.
#
# It is layered on top of `docker-compose.yaml`:
#
#   docker compose --env-file .env \
#     -f docker-compose.yaml \
#     -f docker-compose.azure.yaml \
#     pull && up -d
#
# `!reset null` removes the inherited `build:` block (requires Compose v2.24+)
# so the app services are sourced purely from the registry.
#
# Only the app services we build are overridden. The reverse-proxy
# (nginx:alpine), mongodb and grafana-lgtm use public images straight from the
# base compose file. External access is the nginx reverse-proxy only (APP_PORT,
# default 8080); it proxies / -> web-client and /api -> api-gateway internally.
#
# Required environment variables (provided via the generated .env):
#   REGISTRY_BASE  e.g. myregistry.azurecr.io/team-the-rolling-restarts
#   IMAGE_TAG      e.g. the deployed commit SHA

services:
  web-client:
    build: !reset null
    image: ${REGISTRY_BASE}/web-client:${IMAGE_TAG}

  api-gateway:
    build: !reset null
    image: ${REGISTRY_BASE}/api-gateway:${IMAGE_TAG}

  user-service:
    build: !reset null
    image: ${REGISTRY_BASE}/user-service:${IMAGE_TAG}

  content-service:
    build: !reset null
    image: ${REGISTRY_BASE}/content-service:${IMAGE_TAG}

  gen-ai:
    build: !reset null
    image: ${REGISTRY_BASE}/gen-ai:${IMAGE_TAG}
    # The Azure VM is off the TUM network, so Logos is unreachable; GenAI runs against the
    # local Ollama below. Wait for the model to finish pulling before starting.
    depends_on:
      ollama:
        condition: service_healthy

  # Self-hosted LLM for the Azure VM. The base compose gates ollama behind the `local-llm`
  # profile; clear that here so it runs as part of the normal Azure stack, and pull the model
  # on first boot (the volume persists it across restarts).
  ollama:
    profiles: !reset []
    entrypoint:
      - /bin/sh
      - -c
      - |
        ollama serve &
        server_pid=$$!
        until ollama list >/dev/null 2>&1; do sleep 1; done
        ollama pull "$${OLLAMA_MODEL:-llama3.2:1b}"
        wait "$$server_pid"
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:1b}
    healthcheck:
      # Healthy only once the configured model is actually present, so gen-ai doesn't start
      # (and fail) before the pull completes.
      test:
        - CMD-SHELL
        - ollama list | grep -q "$${OLLAMA_MODEL%%:*}"
      # Generous window: the first-boot model pull (~1GB+) must finish before this goes
      # healthy, and gen-ai waits on it. 60 x 10s = 10 min after the start period.
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 30s
