---
global:
  scrape_native_histograms: true
otlp:
  keep_identifying_resource_attributes: true
  # Recommended attributes to be promoted to labels.
  promote_resource_attributes:
    - service.instance.id
    - service.name
    - service.namespace
    - service.version
    - cloud.availability_zone
    - cloud.region
    - container.name
    - deployment.environment # backward compatibility
    - deployment.environment.name
    - k8s.cluster.name
    - k8s.container.name
    - k8s.cronjob.name
    - k8s.daemonset.name
    - k8s.deployment.name
    - k8s.job.name
    - k8s.namespace.name
    - k8s.node.name
    - k8s.pod.name
    - k8s.replicaset.name
    - k8s.statefulset.name
    - host.name
    - postgresql.database.name
    - postgresql.schema.name
    - postgresql.table.name
    - postgresql.index.name
    - database # used by otelcol/receiver/mongodb
    - kafka.cluster.alias
storage:
  tsdb:
    # A 10min time window is enough because it can easily absorb retries and network delays.
    out_of_order_time_window: 10m
scrape_configs:
  # Single generic label/annotation-based auto-discovery job, replacing one hardcoded job_name
  # block per service: any pod in the app namespace carrying `monitoring: "true"` (set by
  # infra/helm/templates/deployment.yaml on every workload with a `metricsPath` value) is scraped
  # automatically, with its port/path read from `prometheus.io/port`/`prometheus.io/path`
  # annotations. Onboarding a new service means adding those to its pod template — no prometheus.yaml
  # edit needed. `job` is set from the pod's `app` label so existing dashboards/alerts filtering
  # `job=~"api-gateway|..."` keep working unchanged.
  #
  # Targets the app namespace, not grafana-lgtm's own — this file is shared between docker-compose
  # (single namespace, N/A) and Kubernetes, where grafana-lgtm now runs in its own dedicated
  # namespace (monitoring.namespace) separate from the app workloads it scrapes. The templated
  # {{ .Release.Namespace }} below is rendered via `tpl` in
  # infra/helm/templates/monitoring.yaml — this file is NOT valid standalone YAML outside that
  # render step.
  - job_name: kubernetes-pods
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names: ["{{ .Release.Namespace }}"]
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_monitoring]
        regex: "true"
        action: keep
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        regex: (.+)
        target_label: __metrics_path__
      - source_labels: [__meta_kubernetes_pod_ip, __meta_kubernetes_pod_annotation_prometheus_io_port]
        regex: (.+);(.+)
        target_label: __address__
        replacement: ${1}:${2}
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: instance
      - source_labels: [__meta_kubernetes_pod_label_app]
        target_label: job
