{{/* Render the external ingress only when explicitly enabled. */}}
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls:
    - hosts:
        - {{ .Values.hosts.web }}
        - {{ .Values.hosts.api }}
        - {{ .Values.hosts.ai }}
      secretName: {{ .Values.ingress.tlsSecret }}
  rules:
    - host: {{ .Values.hosts.web }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.webClient.name }}
                port:
                  number: {{ .Values.webClient.port }}
    - host: {{ .Values.hosts.api }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.springApi.name }}
                port:
                  number: {{ .Values.springApi.port }}
    - host: {{ .Values.hosts.ai }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.genAi.name }}
                port:
                  number: {{ .Values.genAi.port }}
{{- end }}