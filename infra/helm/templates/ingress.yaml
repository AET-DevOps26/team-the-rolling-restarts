{{/* An Ingress can only target Services in its own namespace, but grafana-lgtm's real Service
lives in monitoring.namespace — so route /monitoring through this ExternalName alias instead,
which just resolves (via cluster DNS) to the real Service in the other namespace. No NetworkPolicy
exists in this cluster's manifests to block that cross-namespace path. */}}
{{- if and .Values.ingress.enabled .Values.appWorkloads.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: grafana-lgtm-external
spec:
  type: ExternalName
  externalName: {{ .Values.monitoring.name }}.{{ .Values.monitoring.namespace }}.svc.cluster.local
  ports:
    - name: grafana
      port: 3000
      targetPort: 3000
---
{{/* Render the external ingress only when explicitly enabled, and only alongside the app
workloads it routes to (routing to nothing during `make helm-destroy` is meaningless). */}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}
  annotations:
    cert-manager.io/cluster-issuer: {{ .Values.ingress.clusterIssuer }}
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: {{ .Values.ingress.className }}
  tls:
    - hosts:
        - {{ .Values.host }}
      secretName: {{ .Values.ingress.tlsSecret }}
  rules:
    - host: {{ .Values.host }}
      http:
        paths:
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.apiGateway.name }}
                port:
                  number: {{ .Values.apiGateway.port }}
          - path: /actuator/health
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.apiGateway.name }}
                port:
                  number: {{ .Values.apiGateway.port }}
          - path: /swagger-ui
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.apiGateway.name }}
                port:
                  number: {{ .Values.apiGateway.port }}
          - path: /v3/api-docs
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.apiGateway.name }}
                port:
                  number: {{ .Values.apiGateway.port }}
          # No trailing slash and pathType Prefix (matches /monitoring and /monitoring/*) —
          # grafana-lgtm runs with GF_SERVER_SERVE_FROM_SUB_PATH=true (templates/monitoring.yaml)
          # and expects to see the /monitoring prefix itself, not have it stripped.
          - path: /monitoring
            pathType: Prefix
            backend:
              service:
                name: grafana-lgtm-external
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.webClient.name }}
                port:
                  number: {{ .Values.webClient.port }}
{{- end }}
