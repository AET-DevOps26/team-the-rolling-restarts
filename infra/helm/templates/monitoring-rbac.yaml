apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.monitoring.name }}
  labels:
{{ include "newsGenAI.labels" (dict "name" .Values.monitoring.name "releaseName" $.Release.Name) | indent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Values.monitoring.name }}-pod-reader
  labels:
{{ include "newsGenAI.labels" (dict "name" .Values.monitoring.name "releaseName" $.Release.Name) | indent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.monitoring.name }}-pod-reader
  labels:
{{ include "newsGenAI.labels" (dict "name" .Values.monitoring.name "releaseName" $.Release.Name) | indent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ .Values.monitoring.name }}
roleRef:
  kind: Role
  name: {{ .Values.monitoring.name }}-pod-reader
  apiGroup: rbac.authorization.k8s.io
