# Lives in monitoring.namespace (not gated by appWorkloads.enabled, unlike templates/secrets.yaml —
# monitoring.yaml as a whole is unconditional) since the Deployment below that consumes it via
# secretKeyRef runs in that same namespace; a Secret in a different namespace isn't visible to it.
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin-credentials
  namespace: {{ .Values.monitoring.namespace }}
type: Opaque
stringData:
  password: {{ required "monitoring.adminPassword is required — set it in secrets-values.yaml" .Values.monitoring.adminPassword | quote }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-lgtm-prometheus-config
  namespace: {{ .Values.monitoring.namespace }}
data:
  # Rendered with `tpl` (not a plain .Files.Get) so the app-namespace placeholder inside the file
  # can resolve to {{ .Release.Namespace }} — this ConfigMap lives in monitoring.namespace, but
  # Prometheus's kubernetes_sd_configs needs to discover pods over in the app namespace instead.
  prometheus.yaml: |
{{ tpl (.Files.Get "files/grafana/prometheus.yaml") $ | indent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-lgtm-dashboard
  namespace: {{ .Values.monitoring.namespace }}
data:
  service-overview.json: |
{{ .Files.Get "files/grafana/dashboards/service-overview.json" | indent 4 }}
  red-metrics-classic.json: |
{{ .Files.Get "files/grafana/dashboards/red-metrics-classic.json" | indent 4 }}
  genai-overview.json: |
{{ .Files.Get "files/grafana/dashboards/genai-overview.json" | indent 4 }}
  webclient-overview.json: |
{{ .Files.Get "files/grafana/dashboards/webclient-overview.json" | indent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-lgtm-provisioning
  namespace: {{ .Values.monitoring.namespace }}
data:
  custom-dashboards.yaml: |
{{ .Files.Get "files/grafana/provisioning/dashboards/custom-dashboards.yaml" | indent 4 }}
  default-dashboards-override.yaml: |
{{ .Files.Get "files/grafana/provisioning/dashboards/default-dashboards-override.yaml" | indent 4 }}
  rules.yaml: |
{{ .Files.Get "files/grafana/provisioning/alerting/rules.yaml" | indent 4 }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.monitoring.name }}-data
  namespace: {{ .Values.monitoring.namespace }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.monitoring.storage }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.monitoring.name }}
  namespace: {{ .Values.monitoring.namespace }}
  labels:
{{ include "newsGenAI.labels" (dict "name" .Values.monitoring.name "releaseName" $.Release.Name) | indent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ .Values.monitoring.name }}
  template:
    metadata:
      labels:
{{ include "newsGenAI.labels" (dict "name" .Values.monitoring.name "releaseName" $.Release.Name) | indent 8 }}
    spec:
      serviceAccountName: {{ .Values.monitoring.name }}
      containers:
        - name: {{ .Values.monitoring.name }}
          image: {{ .Values.monitoring.image }}
          ports:
            - containerPort: 3000
            - containerPort: 4317
            - containerPort: 4318
          env:
            # The base image's own run-grafana.sh defaults this to "true" with org role "Admin" —
            # without this override, anyone reaching the Service gets full admin access with no
            # login at all, making the password below moot. Confirmed live against the
            # docker-compose copy of this same image before this was set.
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-admin-credentials
                  key: password
            # Routed through the shared ingress at /monitoring (templates/ingress.yaml) via an
            # ExternalName Service, since an Ingress can only target Services in its own namespace
            # and grafana-lgtm lives in monitoring.namespace.
            - name: GF_SERVER_ROOT_URL
              value: "https://{{ $.Values.host }}/monitoring/"
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"
          resources:
{{ toYaml .Values.monitoring.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
            - name: prometheus-config
              mountPath: /otel-lgtm/prometheus.yaml
              subPath: prometheus.yaml
            - name: dashboard
              mountPath: /otel-lgtm/grafana-dashboards-custom/service-overview.json
              subPath: service-overview.json
            - name: dashboard
              mountPath: /otel-lgtm/grafana-dashboards-custom/red-metrics-classic.json
              subPath: red-metrics-classic.json
            - name: dashboard
              mountPath: /otel-lgtm/grafana-dashboards-custom/genai-overview.json
              subPath: genai-overview.json
            - name: dashboard
              mountPath: /otel-lgtm/grafana-dashboards-custom/webclient-overview.json
              subPath: webclient-overview.json
            - name: provisioning
              mountPath: /otel-lgtm/grafana/conf/provisioning/dashboards/custom-dashboards.yaml
              subPath: custom-dashboards.yaml
            - name: provisioning
              mountPath: /otel-lgtm/grafana/conf/provisioning/dashboards/grafana-dashboards.yaml
              subPath: default-dashboards-override.yaml
            - name: provisioning
              mountPath: /otel-lgtm/grafana/conf/provisioning/alerting/rules.yaml
              subPath: rules.yaml
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Values.monitoring.name }}-data
        - name: prometheus-config
          configMap:
            name: grafana-lgtm-prometheus-config
        - name: dashboard
          configMap:
            name: grafana-lgtm-dashboard
        - name: provisioning
          configMap:
            name: grafana-lgtm-provisioning
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.monitoring.name }}
  namespace: {{ .Values.monitoring.namespace }}
  labels:
{{ include "newsGenAI.labels" (dict "name" .Values.monitoring.name "releaseName" $.Release.Name) | indent 4 }}
spec:
  type: ClusterIP
  selector:
    app: {{ .Values.monitoring.name }}
  ports:
    - name: grafana
      port: 3000
      targetPort: 3000
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
