{{/* Render the deployments from the same template to keep the chart small. */}}
{{- $apps := list
  (dict "key" "webClient" "cfg" .Values.webClient)
  (dict "key" "apiGateway" "cfg" .Values.apiGateway)
  (dict "key" "userService" "cfg" .Values.userService)
  (dict "key" "contentService" "cfg" .Values.contentService)
  (dict "key" "genAi" "cfg" .Values.genAi)
-}}
{{- range $index, $app := $apps }}
{{- $cfg := $app.cfg -}}
{{- if $index }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $cfg.name }}
  labels:
{{ include "newsGenAI.labels" (dict "name" $cfg.name "releaseName" $.Release.Name) | indent 4 }}
spec:
  replicas: {{ default $.Values.global.replicas $cfg.replicas }}
  # Recreate (not RollingUpdate) so an upgrade tears the old pod down before starting the new
  # one. The `deployment` namespace has a tight limits ResourceQuota (2 CPU / 3000Mi); a rolling
  # update would briefly need 2x a pod's limits and be rejected with "exceeded quota".
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ $cfg.name }}
  template:
    metadata:
      labels:
{{ include "newsGenAI.labels" (dict "name" $cfg.name "releaseName" $.Release.Name) | indent 8 }}
    spec:
      serviceAccountName: {{ $cfg.name }}
      {{- with $.Values.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ $cfg.name }}
          image: {{ include "newsGenAI.image" (dict "global" $.Values.global "app" $cfg) }}
          imagePullPolicy: {{ default $.Values.global.pullPolicy $cfg.imagePullPolicy }}
          ports:
            - containerPort: {{ $cfg.port }}
          env:
{{- range $env := $cfg.env }}
            - name: {{ $env.name }}
              value: {{ $env.value | quote }}
{{- end }}
{{- if eq $app.key "apiGateway" }}
            # Lock CORS to the ingress origin; tracks .Values.host (incl. the dev host override).
            - name: CORS_ALLOWED_ORIGINS
              value: {{ printf "https://%s" $.Values.host | quote }}
{{- end }}
{{- range $env := $cfg.secretEnv }}
            - name: {{ $env.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ $env.secretName }}
                  key: {{ $env.secretKey }}
{{- end }}
          readinessProbe:
            httpGet:
              path: {{ default $.Values.global.probes.path $cfg.probes.path | quote }}
              port: {{ $cfg.port }}
            initialDelaySeconds: {{ $cfg.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ $cfg.probes.readiness.periodSeconds }}
{{- with $cfg.probes.readiness.timeoutSeconds }}
            timeoutSeconds: {{ . }}
{{- end }}
          livenessProbe:
            httpGet:
              path: {{ default $.Values.global.probes.path $cfg.probes.path | quote }}
              port: {{ $cfg.port }}
            initialDelaySeconds: {{ $cfg.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ $cfg.probes.liveness.periodSeconds }}
{{- with $cfg.probes.liveness.timeoutSeconds }}
            timeoutSeconds: {{ . }}
{{- end }}
          startupProbe:
            httpGet:
              path: {{ default $.Values.global.probes.path $cfg.probes.path | quote }}
              port: {{ $cfg.port }}
            failureThreshold: 30
            periodSeconds: 10
          resources:
{{ toYaml (default $.Values.global.resources $cfg.resources) | nindent 12 }}
{{- end }}
