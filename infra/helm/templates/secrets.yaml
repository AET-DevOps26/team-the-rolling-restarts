apiVersion: v1
kind: Secret
metadata:
  name: mongodb-credentials
type: Opaque
stringData:
  root-username: {{ required "mongodb.rootUsername is required — set it in secrets-values.yaml" .Values.mongodb.rootUsername | quote }}
  root-password: {{ required "mongodb.rootPassword is required — set it in secrets-values.yaml" .Values.mongodb.rootPassword | quote }}
  uri: {{ printf "mongodb://%s:%s@%s:%v/%s?authSource=admin" (required "mongodb.rootUsername is required" .Values.mongodb.rootUsername) (required "mongodb.rootPassword is required" .Values.mongodb.rootPassword) .Values.mongodb.name (.Values.mongodb.port | toString) .Values.mongodb.database | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-user-credentials
type: Opaque
stringData:
  uri: {{ printf "mongodb://%s:%s@%s:%v/users?authSource=admin" (required "mongodb.rootUsername is required" .Values.mongodb.rootUsername) (required "mongodb.rootPassword is required" .Values.mongodb.rootPassword) .Values.mongodb.name (.Values.mongodb.port | toString) | quote }}
---
# Shared RSA key pair used by every user-service replica to sign JWTs. All replicas load
# the same key and derive an identical JWK kid from its thumbprint, so a token signed by
# one pod validates against the JWKS served by any pod behind the Service. Override the
# dev defaults in values.yaml via secrets-values.yaml for any real deployment.
apiVersion: v1
kind: Secret
metadata:
  name: jwt-keys
type: Opaque
stringData:
  public-key: {{ required "userService.jwtKeys.publicKey is required — set it in secrets-values.yaml" .Values.userService.jwtKeys.publicKey | quote }}
  private-key: {{ required "userService.jwtKeys.privateKey is required — set it in secrets-values.yaml" .Values.userService.jwtKeys.privateKey | quote }}
