apiVersion: v1
kind: Secret
metadata:
  name: mongodb-credentials
type: Opaque
stringData:
  root-username: {{ .Values.mongodb.rootUsername | quote }}
  root-password: {{ .Values.mongodb.rootPassword | quote }}
  uri: {{ printf "mongodb://%s:%s@%s:%v/%s?authSource=admin" .Values.mongodb.rootUsername .Values.mongodb.rootPassword .Values.mongodb.name (.Values.mongodb.port | toString) .Values.mongodb.database }}
---
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-user-credentials
type: Opaque
stringData:
  uri: {{ printf "mongodb://%s:%s@%s:%v/users?authSource=admin" .Values.mongodb.rootUsername .Values.mongodb.rootPassword .Values.mongodb.name (.Values.mongodb.port | toString) }}
---
# Shared RSA key pair used by every user-service replica to sign JWTs. All replicas load
# the same key and derive an identical JWK kid from its thumbprint, so a token signed by
# one pod validates against the JWKS served by any pod behind the Service. Override the
# dev defaults in values.yaml via secrets-values.yaml for any real deployment.
apiVersion: v1
kind: Secret
metadata:
  name: jwt-keys
type: Opaque
stringData:
  public-key: {{ .Values.userService.jwtKeys.publicKey | quote }}
  private-key: {{ .Values.userService.jwtKeys.privateKey | quote }}
