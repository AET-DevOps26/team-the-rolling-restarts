{{/* Gated on appWorkloads.enabled so `make helm-destroy` can tear this down (including its data,
same as a full uninstall always has) without touching grafana-lgtm (templates/monitoring.yaml),
which has no such guard. */}}
{{- if .Values.appWorkloads.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.mongodb.name }}-data
spec:
  {{- with .Values.mongodb.storageClassName }}
  storageClassName: {{ . }}
  {{- end }}
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.mongodb.storage }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.mongodb.name }}
  labels:
    app: {{ .Values.mongodb.name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.mongodb.name }}
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: {{ .Values.mongodb.name }}
    spec:
      containers:
        - name: {{ .Values.mongodb.name }}
          image: {{ .Values.mongodb.image }}
          # Not runAsNonRoot here (unlike the app workloads in deployment.yaml): the official
          # mongo entrypoint needs root at container start to chown /data/db to the mongodb user
          # before dropping privilege itself — untested whether forcing non-root + fsGroup here
          # would work, and this is the one data-bearing workload, so left alone rather than risk
          # breaking it. capabilities.drop: ["ALL"] is NOT safe regardless of user here (unlike
          # the app workloads) — it strips CAP_CHOWN/SETUID/SETGID, which the entrypoint needs for
          # that same chown-then-drop-to-mongodb-user sequence. Confirmed live against a fresh
          # volume: `docker run --cap-drop=ALL` fails with "chown: ... Operation not permitted",
          # then fails again at the privilege-drop step even with just CHOWN added back
          # ("failed switching to 'mongodb': operation not permitted"); this exact set of three
          # is the minimal one that starts cleanly.
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["CHOWN", "SETUID", "SETGID"]
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: {{ .Values.mongodb.port }}
          env:
            - name: MONGO_INITDB_DATABASE
              value: {{ .Values.mongodb.database | quote }}
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mongodb-credentials
                  key: root-username
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb-credentials
                  key: root-password
          startupProbe:
            tcpSocket:
              port: {{ .Values.mongodb.port }}
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: {{ .Values.mongodb.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: {{ .Values.mongodb.port }}
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
{{ toYaml .Values.mongodb.resources | nindent 12 }}
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
      volumes:
        - name: mongodb-data
          persistentVolumeClaim:
            claimName: {{ .Values.mongodb.name }}-data
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.mongodb.name }}
spec:
  type: ClusterIP
  selector:
    app: {{ .Values.mongodb.name }}
  ports:
    - protocol: TCP
      port: {{ .Values.mongodb.port }}
      targetPort: {{ .Values.mongodb.port }}
{{- end }}
