# Example secrets for the Helm chart.
#
# These values are declared `required` by templates/secrets.yaml (five of them) and
# templates/monitoring.yaml (monitoring.adminPassword) — `helm` will refuse to render if any is
# empty, so a real secrets-values.yaml MUST provide all of them.
#
# Copy this file and fill in real values:
#   cp secrets-values.example.yaml secrets-values.yaml
# secrets-values.yaml is gitignored — DO NOT commit it.
#
# !! ROTATING mongodb.rootPassword: MongoDB only applies the root password on FIRST init (empty
# data dir). If you change it while the mongodb-data PVC still exists, Mongo keeps the OLD password
# and user/content-service fail with "Authentication failed". After changing the password, wipe the
# volume so it re-initializes (dev data is disposable):
#   kubectl -n deployment delete deploy mongodb
#   kubectl -n deployment delete pvc mongodb-data
#   make helm-deploy
#
# Deploy with it:
#   helm upgrade --install newsgenai . \
#     -f values.yaml -f secrets-values.yaml -f image-values.yaml
# or via the Makefile (auto-included if present):
#   make helm-deploy
#
# ---------------------------------------------------------------------------
# Quick start: generate a working secrets-values.yaml with a fresh RSA key pair
# (run from infra/helm/). Replace the Mongo password with your own.
#
#   openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 -out /tmp/jwt.pem
#   {
#     echo "mongodb:"
#     echo "  rootUsername: root"
#     echo "  rootPassword: $(openssl rand -hex 16)"
#     echo "userService:"
#     echo "  jwtKeys:"
#     echo "    publicKey: |"
#     openssl pkey -in /tmp/jwt.pem -pubout | sed 's/^/      /'
#     echo "    privateKey: |"
#     sed 's/^/      /' /tmp/jwt.pem
#     echo "  serviceClientSecret: $(openssl rand -hex 32)"
#   } > secrets-values.yaml
#   rm /tmp/jwt.pem
# ---------------------------------------------------------------------------

mongodb:
  rootUsername: root
  rootPassword: changeme

# Shared RSA key pair the user-service uses to sign JWTs. The same key MUST be used by every
# replica (a token signed by one pod has to validate against the JWKS served by any pod), so it
# lives here rather than being generated per-pod. Generate a fresh pair:
#   openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 -out private.pem
#   openssl pkey -in private.pem -pubout -out public.pem
userService:
  jwtKeys:
    publicKey: |
      -----BEGIN PUBLIC KEY-----
      ...your public key...
      -----END PUBLIC KEY-----
    privateKey: |
      -----BEGIN PRIVATE KEY-----
      ...your private key...
      -----END PRIVATE KEY-----
  # Shared secret user-service uses for its client_credentials token when calling content-service's
  # subscribe/unsubscribe endpoints. Generate with: openssl rand -hex 32
  serviceClientSecret: changeme-service-secret

# Optional Logos API key (lg-...) for gen-ai. Only reachable from TUM network / eduVPN.
# Leave empty to start without cloud LLM; set for in-cluster Logos access.
genAi:
  llmApiKey: ""

# grafana-lgtm admin login, exposed at /monitoring behind the shared ingress. Generate with:
#   openssl rand -hex 16
monitoring:
  adminPassword: changeme-grafana-admin
