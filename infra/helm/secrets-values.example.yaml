# Copy this file to secrets-values.yaml and fill in your actual credentials.
# DO NOT commit secrets-values.yaml to Git.
#
# Usage:
#   helm upgrade --install newsgenai . -f values.yaml -f secrets-values.yaml -f image-values.yaml
#
# Or with the Makefile:
#   make helm-deploy SECRETS=-f secrets-values.yaml

mongodb:
  rootUsername: root
  rootPassword: changeme

# Shared RSA key pair the user-service uses to sign JWTs. Generate a fresh pair:
#   openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 -out private.pem
#   openssl pkey -in private.pem -pubout -out public.pem
# All replicas MUST use the same key, or auth flakes behind the load balancer.
userService:
  jwtKeys:
    publicKey: |
      -----BEGIN PUBLIC KEY-----
      ...your public key...
      -----END PUBLIC KEY-----
    privateKey: |
      -----BEGIN PRIVATE KEY-----
      ...your private key...
      -----END PRIVATE KEY-----
