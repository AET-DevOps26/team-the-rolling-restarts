# Shared defaults used by every workload in the chart.
global:
  registry: ghcr.io/aet-devops26/team-the-rolling-restarts
  tag: latest
  pullPolicy: Always
  replicas: 1
  probes:
    path: /
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi
  service:
    type: ClusterIP
    protocol: TCP

imagePullSecrets: []

# The workflow-generated image override file only needs to set `image` per app.
webClient:
  name: web-client
  imageName: web-client
  image: ""
  port: 3000
  env:
    - name: NODE_ENV
      value: production
    # NEXT_PUBLIC_API_BASE_URL is baked into the image at build time (see web-client/Dockerfile).
  probes:
    readiness:
      initialDelaySeconds: 5
      periodSeconds: 10
    liveness:
      initialDelaySeconds: 15
      periodSeconds: 20
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# API Gateway routes traffic to user-service and content-service.
apiGateway:
  name: api-gateway
  imageName: api-gateway
  image: ""
  port: 8080
  env:
    - name: SPRING_PROFILES_ACTIVE
      value: production
    - name: JAVA_TOOL_OPTIONS
      value: -XX:MaxRAMPercentage=75
    - name: USER_SERVICE_URL
      value: http://user-service:8081
    - name: CONTENT_SERVICE_URL
      value: http://content-service:8082
    - name: GEN_AI_URL
      value: http://gen-ai:8000
    - name: JWT_ISSUER_URI
      value: http://user-service:8081
    # CORS_ALLOWED_ORIGINS is injected by templates/deployment.yaml as https://<.Values.host>
    # so it always matches the ingress origin (and the dev host override) without drifting.
  probes:
    path: /actuator/health
    readiness:
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 2
    liveness:
      initialDelaySeconds: 20
      periodSeconds: 20
      timeoutSeconds: 2
  resources:
    requests:
      cpu: 50m
      memory: 200Mi
    limits:
      cpu: 200m
      memory: 300Mi

# User service handles auth, login, and user settings (MongoDB).
userService:
  name: user-service
  imageName: user-service
  image: ""
  port: 8081
  env:
    - name: SPRING_PROFILES_ACTIVE
      value: production
    - name: JAVA_TOOL_OPTIONS
      value: -XX:MaxRAMPercentage=75
    - name: JWT_ISSUER
      value: http://user-service:8081
    - name: CONTENT_SERVICE_URL
      value: http://content-service:8082
  secretEnv:
    - name: SPRING_MONGODB_URI
      secretName: mongodb-user-credentials
      secretKey: uri
    - name: JWT_RSA_PUBLIC_KEY
      secretName: jwt-keys
      secretKey: public-key
    - name: JWT_RSA_PRIVATE_KEY
      secretName: jwt-keys
      secretKey: private-key
    - name: SERVICE_CLIENT_SECRET
      secretName: service-credentials
      secretKey: client-secret
  resources:
    requests:
      cpu: 50m
      memory: 200Mi
    limits:
      cpu: 200m
      memory: 300Mi
  jwtKeys:
    publicKey: ""
    privateKey: ""
  # Shared secret for the client_credentials token user-service uses to call content-service's
  # subscribe/unsubscribe endpoints (scope source.write). No default — set in secrets-values.yaml.
  serviceClientSecret: ""
  probes:
    path: /actuator/health
    readiness:
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 2
    liveness:
      initialDelaySeconds: 20
      periodSeconds: 20
      timeoutSeconds: 2

# Content service manages RSS feeds and articles (MongoDB).
contentService:
  name: content-service
  imageName: content-service
  image: ""
  port: 8082
  env:
    - name: SPRING_PROFILES_ACTIVE
      value: production
    - name: JAVA_TOOL_OPTIONS
      value: -XX:MaxRAMPercentage=75
    - name: JWT_ISSUER_URI
      value: http://user-service:8081
  secretEnv:
    - name: SPRING_MONGODB_URI
      secretName: mongodb-credentials
      secretKey: uri
  probes:
    path: /actuator/health
    readiness:
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
    liveness:
      initialDelaySeconds: 30
      periodSeconds: 20
      timeoutSeconds: 5
  resources:
    requests:
      cpu: 50m
      memory: 200Mi
    limits:
      cpu: 200m
      memory: 300Mi

# GenAI defaults mirror the handwritten Kubernetes manifest.
genAi:
  name: gen-ai
  imageName: gen-ai
  image: ""
  port: 8000
  # Optional Logos API key (lg-...); only reachable from TUM network / eduVPN.
  # Override via secrets-values.yaml (see secrets-values.example.yaml).
  llmApiKey: ""
  env:
    - name: PYTHONUNBUFFERED
      value: "1"
    - name: LOG_LEVEL
      value: INFO
    - name: LLM_PROVIDER
      value: logos
    - name: LLM_BASE_URL
      value: https://logos.aet.cit.tum.de/v1
    - name: LLM_MODEL
      value: openai/gpt-oss-120b
    - name: INTERNAL_API_URL
      value: http://api-gateway:8080
  secretEnv:
    - name: LLM_API_KEY
      secretName: llm-credentials
      secretKey: apiKey
  probes:
    path: /health
    readiness:
      initialDelaySeconds: 5
      periodSeconds: 10
    liveness:
      initialDelaySeconds: 15
      periodSeconds: 20
  resources:
    requests:
      cpu: 30m
      memory: 64Mi
    limits:
      cpu: 150m
      memory: 200Mi

# Database services
mongodb:
  name: mongodb
  image: mongo:8
  port: 27017
  database: content
  # Credentials: no defaults committed. Provide both at deploy time via secrets-values.yaml
  # (see secrets-values.example.yaml). Rendering fails if either is empty.
  rootUsername: ""
  rootPassword: ""
  storage: 1Gi
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 200m
      memory: 512Mi

ingress:
  enabled: true
  className: nginx
  clusterIssuer: letsencrypt-staging
  tlsSecret: rolling-restarts-tls

host: rolling-restarts.stud.k8s.aet.cit.tum.de
