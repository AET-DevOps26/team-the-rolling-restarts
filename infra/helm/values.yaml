# Content service manages RSS feeds and articles (MongoDB).
contentService:
  name: content-service
  imageName: content-service
  image: ""
  port: 8082
  env:
    - name: SPRING_PROFILES_ACTIVE
      value: production
    - name: JAVA_TOOL_OPTIONS
      value: -XX:MaxRAMPercentage=75
    - name: JWT_ISSUER_URI
      value: http://user-service:8081
  secretEnv:
    - name: SPRING_MONGODB_URI
      secretName: mongodb-credentials
      secretKey: uri
  probes:
    path: /actuator/health
    readiness:
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
    liveness:
      initialDelaySeconds: 30
      periodSeconds: 20
      timeoutSeconds: 5
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# GenAI defaults mirror the handwritten Kubernetes manifest.
genAi:
  name: gen-ai
  imageName: gen-ai
  image: ""
  port: 8000
  env:
    - name: PYTHONUNBUFFERED
      value: "1"
    - name: LOG_LEVEL
      value: INFO
  probes:
    path: /health
    readiness:
      initialDelaySeconds: 5
      periodSeconds: 10
    liveness:
      initialDelaySeconds: 15
      periodSeconds: 20

# Database services
mongodb:
  name: mongodb
  image: mongo:8
  port: 27017
  database: content
  rootUsername: root
  rootPassword: secret
  storage: 1Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 250m
      memory: 512Mi

ingress:
  enabled: true
  className: nginx
  clusterIssuer: letsencrypt-staging
  tlsSecret: rolling-restarts-tls

host: rolling-restarts.stud.k8s.aet.cit.tum.de
