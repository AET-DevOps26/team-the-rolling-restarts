# Shared defaults used by every workload in the chart.
global:
  registry: ghcr.io/aet-devops26/team-the-rolling-restarts
  tag: latest
  pullPolicy: Always
  replicas: 1
  probes:
    path: /
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  service:
    type: ClusterIP
    protocol: TCP

imagePullSecrets: []

# The workflow-generated image override file only needs to set `image` per app.
webClient:
  name: web-client
  imageName: web-client
  image: ""
  port: 3000
  env:
    - name: NODE_ENV
      value: production
    # NEXT_PUBLIC_API_BASE_URL is baked into the image at build time (see web-client/Dockerfile).
  probes:
    readiness:
      initialDelaySeconds: 5
      periodSeconds: 10
    liveness:
      initialDelaySeconds: 15
      periodSeconds: 20

# API Gateway routes traffic to user-service and content-service.
apiGateway:
  name: api-gateway
  imageName: api-gateway
  image: ""
  port: 8080
  env:
    - name: SPRING_PROFILES_ACTIVE
      value: production
    - name: JAVA_TOOL_OPTIONS
      value: -XX:MaxRAMPercentage=75
    - name: USER_SERVICE_URL
      value: http://user-service:8081
    - name: CONTENT_SERVICE_URL
      value: http://content-service:8082
    - name: GEN_AI_URL
      value: http://gen-ai:8000
    - name: JWT_ISSUER_URI
      value: http://user-service:8081
  probes:
    path: /actuator/health
    readiness:
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 2
    liveness:
      initialDelaySeconds: 20
      periodSeconds: 20
      timeoutSeconds: 2
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# User service handles auth, login, and user settings (MongoDB).
userService:
  name: user-service
  imageName: user-service
  image: ""
  port: 8081
  env:
    - name: SPRING_PROFILES_ACTIVE
      value: production
    - name: JAVA_TOOL_OPTIONS
      value: -XX:MaxRAMPercentage=75
    - name: JWT_ISSUER
      value: http://user-service:8081
  secretEnv:
    - name: SPRING_MONGODB_URI
      secretName: mongodb-user-credentials
      secretKey: uri
