# Shared defaults used by every workload in the chart.
global:
  registry: ghcr.io/aet-devops26/team-the-rolling-restarts
  tag: latest
  pullPolicy: Always
  replicas: 1
  probes:
    path: /
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi
  service:
    type: ClusterIP
    protocol: TCP

imagePullSecrets: []

# The workflow-generated image override file only needs to set `image` per app.
webClient:
  name: web-client
  imageName: web-client
  image: ""
  port: 3000
  env:
    - name: NODE_ENV
      value: production
    # NEXT_PUBLIC_API_BASE_URL is baked into the image at build time (see web-client/Dockerfile).
  probes:
    readiness:
      initialDelaySeconds: 5
      periodSeconds: 10
    liveness:
      initialDelaySeconds: 15
      periodSeconds: 20
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

# API Gateway routes traffic to user-service and content-service.
apiGateway:
  name: api-gateway
  imageName: api-gateway
  image: ""
  port: 8080
  env:
    - name: SPRING_PROFILES_ACTIVE
      value: production
    - name: JAVA_TOOL_OPTIONS
      value: -XX:MaxRAMPercentage=75
    - name: USER_SERVICE_URL
      value: http://user-service:8081
    - name: CONTENT_SERVICE_URL
      value: http://content-service:8082
    - name: GEN_AI_URL
      value: http://gen-ai:8000
    - name: JWT_ISSUER_URI
      value: http://user-service:8081
  probes:
    path: /actuator/health
    readiness:
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 2
    liveness:
      initialDelaySeconds: 20
      periodSeconds: 20
      timeoutSeconds: 2
  # Requests are the namespace fair-use budget (capped at 4 vCPU / 6 GB per team). Kept low so
  # two replicas of every service still sit well under half the budget. CPU limit is generous
  # because limits are NOT counted toward the cap and a throttled JVM is very slow to start.
  resources:
    requests:
      cpu: 150m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 640Mi

# User service handles auth, login, and user settings (MongoDB).
userService:
  name: user-service
  imageName: user-service
  image: ""
  port: 8081
  env:
    - name: SPRING_PROFILES_ACTIVE
      value: production
    - name: JAVA_TOOL_OPTIONS
      value: -XX:MaxRAMPercentage=75
    - name: JWT_ISSUER
      value: http://user-service:8081
    - name: CONTENT_SERVICE_URL
      value: http://content-service:8082
  secretEnv:
    - name: SPRING_MONGODB_URI
      secretName: mongodb-user-credentials
      secretKey: uri
    - name: JWT_RSA_PUBLIC_KEY
      secretName: jwt-keys
      secretKey: public-key
    - name: JWT_RSA_PRIVATE_KEY
      secretName: jwt-keys
      secretKey: private-key
  # RSA key pair for signing JWTs. No default is committed — both MUST be provided at deploy time
  # via secrets-values.yaml (see secrets-values.example.yaml). Rendering fails if either is empty.
  # Generate with: openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048
  jwtKeys:
    publicKey: ""
    privateKey: ""
  probes:
    path: /actuator/health
    readiness:
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 2
    liveness:
      initialDelaySeconds: 20
      periodSeconds: 20
      timeoutSeconds: 2
  # Requests are the namespace fair-use budget (capped at 4 vCPU / 6 GB per team). Kept low so
  # two replicas of every service still sit well under half the budget. CPU limit is generous
  # because limits are NOT counted toward the cap and a throttled JVM is very slow to start.
  resources:
    requests:
      cpu: 150m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 640Mi

# Content service manages RSS feeds and articles (MongoDB).
contentService:
  name: content-service
  imageName: content-service
  image: ""
  port: 8082
  env:
    - name: SPRING_PROFILES_ACTIVE
      value: production
    - name: JAVA_TOOL_OPTIONS
      value: -XX:MaxRAMPercentage=75
    - name: JWT_ISSUER_URI
      value: http://user-service:8081
  secretEnv:
    - name: SPRING_MONGODB_URI
      secretName: mongodb-credentials
      secretKey: uri
  probes:
    path: /actuator/health
    readiness:
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
    liveness:
      initialDelaySeconds: 30
      periodSeconds: 20
      timeoutSeconds: 5
  # Requests are the namespace fair-use budget (capped at 4 vCPU / 6 GB per team). Kept low so
  # two replicas of every service still sit well under half the budget. CPU limit is generous
  # because limits are NOT counted toward the cap and a throttled JVM is very slow to start.
  resources:
    requests:
      cpu: 150m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 640Mi

# GenAI defaults mirror the handwritten Kubernetes manifest.
genAi:
  name: gen-ai
  imageName: gen-ai
  image: ""
  port: 8000
  env:
    - name: PYTHONUNBUFFERED
      value: "1"
    - name: LOG_LEVEL
      value: INFO
  probes:
    path: /health
    readiness:
      initialDelaySeconds: 5
      periodSeconds: 10
    liveness:
      initialDelaySeconds: 15
      periodSeconds: 20
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Database services
mongodb:
  name: mongodb
  image: mongo:8
  port: 27017
  database: content
  # Credentials: no defaults committed. Provide both at deploy time via secrets-values.yaml
  # (see secrets-values.example.yaml). Rendering fails if either is empty.
  rootUsername: ""
  rootPassword: ""
  storage: 1Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

ingress:
  enabled: true
  className: nginx
  clusterIssuer: letsencrypt-staging
  tlsSecret: rolling-restarts-tls

host: rolling-restarts.stud.k8s.aet.cit.tum.de
