---
# `which docker` alone isn't enough: a host can have /usr/bin/docker (e.g. from a partial or
# older install) but be missing the Compose plugin, which would make this task skip setup and
# leave `docker compose` broken. Check both.
- name: Check if Docker and the Compose plugin are already installed
  ansible.builtin.shell: command -v docker >/dev/null && docker compose version >/dev/null 2>&1
  register: docker_check
  failed_when: false
  changed_when: false
  tags: [docker]

# Matches `make azure-vm-docker` (the CI/CD path's one-time VM setup) exactly, rather than
# apt-installing Ubuntu archive's `docker.io`/`docker-compose-v2` — those pull in Ubuntu's own
# `containerd` package, which conflicts at the package-manager level with `containerd.io` (from
# get.docker.com's official repo). Since CI/CD's `azure-vm-docker` may run against this same VM
# either before or after this role, both paths must install Docker the same way or whichever runs
# second fails with "containerd.io : Conflicts: containerd".
#
# NOTE: this still pipes get.docker.com's install script unpinned (no script-integrity or
# Docker-version pin) — flagged in review. Left as-is here rather than guessing at a specific
# version/commit to pin without being able to verify it's still valid; if you tighten this,
# update `make azure-vm-docker` (root Makefile) to match, or the two paths diverge again.
- name: Install Docker via get.docker.com
  ansible.builtin.shell: curl -fsSL https://get.docker.com | sh
  when: docker_check.rc != 0
  notify: restart docker
  tags: [docker]

- name: Ensure docker group exists
  ansible.builtin.group:
    name: docker
    state: present
  tags: [docker]

- name: Add remote user to docker group
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: docker
    append: true
  tags: [docker]

- name: Reset SSH connection so docker group takes effect in the current session
  ansible.builtin.meta: reset_connection
  tags: [docker]

- name: Enable Docker service
  ansible.builtin.systemd:
    name: "{{ docker_service_name }}"
    enabled: true
    state: started
  tags: [docker]
