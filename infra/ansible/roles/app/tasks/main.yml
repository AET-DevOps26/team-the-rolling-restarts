---
- name: Ensure deployment root exists
  ansible.builtin.file:
    path: "{{ project_root }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
  tags: [app, deploy]

- name: Ensure nginx config directory exists
  ansible.builtin.file:
    path: "{{ project_root }}/nginx"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
  tags: [app, deploy]

- name: Copy docker-compose and nginx config files
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ project_root }}/{{ item.dest }}"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"
  loop:
    - { src: "{{ playbook_dir }}/../../docker-compose.yaml", dest: docker-compose.yaml }
    - { src: "{{ playbook_dir }}/../../docker-compose.prod.yaml", dest: docker-compose.prod.yaml }
    - { src: "{{ playbook_dir }}/../../nginx/default.conf", dest: nginx/default.conf }
  notify: restart rolling-restarts
  tags: [app, deploy]

# docker-compose.yaml's grafana-lgtm service bind-mounts ./grafana/prometheus.yaml,
# ./grafana/dashboards/*.json, and ./grafana/provisioning/**/*.yaml relative to project_root —
# without this, those host paths never exist, and Docker's default behavior for a missing
# bind-mount source (auto-creating it as an empty directory) collides with the container's file
# destination ("not a directory" mount error).
#
# Staged, not copied straight into the live path: copying directly into project_root/grafana
# used to mean any failure partway through the transfer (network blip, disk full) left the live
# deployment with a missing or half-written config directory for however long until the next
# successful run — and since docker-compose bind-mounts that path, the very next `docker compose
# up` (including "Force-recreate containers" below, in this same play) would hit Docker's
# directory-autocreation gotcha again. Copying into a staging directory first means a failed copy
# never touches the live directory at all; only the swap below (two fast local renames, not a
# network transfer) can fail partway, and even then grafana.old is left as a manual recovery path
# instead of silently losing the previous config.
#
# Checked in check_mode against the LIVE path first (not the staging one) so the staging
# copy + swap — and the resulting stack restart — only happen when the config actually
# changed. Without this, every playbook run would restage+swap unconditionally (grafana.new
# never persists between runs, so the staging copy always looks "changed" to Ansible) and the
# shell swap task's own changed_when:true would notify a stack restart on every single deploy,
# even when nothing about the grafana config differed.
- name: Check whether the grafana config has changed
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../grafana/"
    dest: "{{ project_root }}/grafana/"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  check_mode: true
  register: grafana_check
  tags: [app, deploy]

- name: Copy grafana-lgtm config to a staging directory
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../grafana/"
    dest: "{{ project_root }}/grafana.new/"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
  when: grafana_check.changed
  tags: [app, deploy]

- name: Atomically swap the staged grafana config into place
  ansible.builtin.shell: |
    set -e
    rm -rf "{{ project_root }}/grafana.old"
    if [ -d "{{ project_root }}/grafana" ]; then
      mv "{{ project_root }}/grafana" "{{ project_root }}/grafana.old"
    fi
    mv "{{ project_root }}/grafana.new" "{{ project_root }}/grafana"
    rm -rf "{{ project_root }}/grafana.old"
  when: grafana_check.changed
  changed_when: true
  notify: restart rolling-restarts
  tags: [app, deploy]

- name: Render deployment environment file
  ansible.builtin.template:
    src: env.j2
    dest: "{{ project_root }}/{{ compose_env_path }}"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"
  notify: restart rolling-restarts
  tags: [app, deploy]

- name: Log in to container registry
  ansible.builtin.command:
    cmd: docker login {{ registry }} -u {{ registry_user }} -p {{ registry_token }}
  become_user: "{{ ansible_user }}"
  changed_when: true
  no_log: true
  when: registry_token is defined and registry_token | length > 0
  tags: [app, deploy]

- name: Render systemd unit for compose stack
  ansible.builtin.template:
    src: rolling-restarts.service.j2
    dest: /etc/systemd/system/{{ app_service_name }}.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload systemd
    - restart rolling-restarts
  tags: [app, deploy]

- name: Pull latest images
  ansible.builtin.command:
    cmd: docker compose --env-file {{ compose_env_path }} -f {{ compose_file }} -f {{ compose_prod_file }} pull
    chdir: "{{ project_root }}"
  become_user: "{{ ansible_user }}"
  tags: [app, deploy]

- name: Force-recreate containers to pick up env/config changes
  ansible.builtin.command:
    cmd: docker compose --env-file {{ compose_env_path }} -f {{ compose_file }} -f {{ compose_prod_file }} up -d --force-recreate
    chdir: "{{ project_root }}"
  become_user: "{{ ansible_user }}"
  tags: [app, deploy]

- name: Ensure project service is enabled and started
  ansible.builtin.systemd:
    name: "{{ app_service_name }}"
    enabled: true
    state: started
  tags: [app, deploy]

- name: Verify project endpoint responds
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ app_env.APP_PORT | default('8080') }}/"
    status_code: 200
    timeout: 30
  register: web_health
  retries: "{{ health_check_retries }}"
  delay: "{{ health_check_delay }}"
  until: web_health.status == 200
  tags: [app, deploy, verify]

# Idempotent: 409 (already registered) is expected on every redeploy after the first.
# Keep these credentials and sources in sync with infra/scripts/seed-demo-data.sh and
# .github/workflows/deploy-azure.yml's remote-deploy.sh — this is the Ansible-native
# equivalent of that same script, run via the uri module (executes on this host, so no
# curl/jq dependency on the VM) rather than shelling out to it.
- name: Seed demo user
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ app_env.APP_PORT | default('8080') }}/api/users/auth/register"
    method: POST
    body_format: json
    body:
      username: "{{ demo_username }}"
      email: "{{ demo_username }}@example.com"
      password: "{{ demo_password }}"
      name: Demo User
    status_code: [201, 409]
    timeout: 30
  tags: [app, deploy, verify]

- name: Log in as demo user to seed their subscriptions
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ app_env.APP_PORT | default('8080') }}/api/users/auth/login"
    method: POST
    body_format: json
    body:
      username: "{{ demo_username }}"
      password: "{{ demo_password }}"
    status_code: [200]
    timeout: 30
  register: demo_login
  tags: [app, deploy, verify]

# All feeds verified reachable (HTTP 200, XML content-type) before adding. Source create
# is idempotent by design (200 if it already exists, returning the existing one; 201 if
# newly created). ignore_errors: these are third-party feeds outside our control (rate
# limiting, geo-blocking, a feed moving) — one being temporarily unreachable is a demo-data
# nicety missing, not a reason to fail an otherwise-successful deployment.
- name: Seed demo sources
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ app_env.APP_PORT | default('8080') }}/api/content/sources"
    method: POST
    headers:
      Authorization: "Bearer {{ demo_login.json.token }}"
    body_format: json
    body:
      name: "{{ item.name }}"
      rssUrl: "{{ item.rss_url }}"
    status_code: [200, 201]
    timeout: 30
  loop:
    - { name: "Süddeutsche Zeitung", rss_url: "https://rss.sueddeutsche.de/alles" }
    - { name: "Die Linke Presse", rss_url: "https://www.die-linke.de/start/presse/feed.rss" }
    - { name: "Fox News Politics", rss_url: "https://moxie.foxnews.com/google-publisher/politics.xml" }
    - { name: "NYT World", rss_url: "https://rss.nytimes.com/services/xml/rss/nyt/World.xml" }
    - { name: "NYT Europe", rss_url: "https://rss.nytimes.com/services/xml/rss/nyt/Europe.xml" }
    - { name: "NYT Technology", rss_url: "https://rss.nytimes.com/services/xml/rss/nyt/Technology.xml" }
    - { name: "NYT Science", rss_url: "https://rss.nytimes.com/services/xml/rss/nyt/Science.xml" }
  register: demo_sources
  ignore_errors: true
  tags: [app, deploy, verify]

# Always 200 and idempotent server-side (does not double-count an existing subscription).
# Same ignore_errors reasoning as above; guards against items that failed (and so lack a
# parsed .json.id) in the loop this depends on.
- name: Subscribe demo user to seeded sources
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ app_env.APP_PORT | default('8080') }}/api/users/users/me/subscriptions/{{ item.json.id }}"
    method: POST
    headers:
      Authorization: "Bearer {{ demo_login.json.token }}"
    status_code: [200]
    timeout: 30
  loop: "{{ demo_sources.results }}"
  when: item.json is defined and item.json.id is defined
  ignore_errors: true
  tags: [app, deploy, verify]
