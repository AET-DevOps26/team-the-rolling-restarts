---
- name: Ensure deployment root exists
  ansible.builtin.file:
    path: "{{ project_root }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
  tags: [app, deploy]

- name: Clone or update project repository
  ansible.builtin.git:
    repo: "{{ project_repo_url }}"
    dest: "{{ project_root }}"
    version: "{{ project_repo_version }}"
    update: true
  become_user: "{{ ansible_user }}"
  tags: [app, deploy]

- name: Render deployment environment file
  ansible.builtin.template:
    src: env.j2
    dest: "{{ project_root }}/{{ compose_env_path }}"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"
  notify: restart rolling-restarts
  tags: [app, deploy]

- name: Render systemd unit for compose stack
  ansible.builtin.template:
    src: rolling-restarts.service.j2
    dest: /etc/systemd/system/{{ app_service_name }}.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload systemd
    - restart rolling-restarts
  tags: [app, deploy]

- name: Ensure project service is enabled
  ansible.builtin.systemd:
    name: "{{ app_service_name }}"
    enabled: true
  tags: [app, deploy]

- name: Verify project endpoint responds
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ app_env.WEB_CLIENT_PORT }}/"
    status_code: 200
    timeout: 30
  register: web_health
  retries: "{{ health_check_retries }}"
  delay: "{{ health_check_delay }}"
  until: web_health.status == 200
  tags: [app, deploy, verify]
