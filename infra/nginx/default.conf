server {
    listen 80;

    # API gateway — backend services, actuator, swagger
    location /api/ {
        proxy_pass http://api-gateway:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /actuator/health {
        proxy_pass http://api-gateway:8080;
        proxy_set_header Host $host;
    }

    location /swagger-ui/ {
        proxy_pass http://api-gateway:8080;
        proxy_set_header Host $host;
    }

    location /swagger-ui.html {
        proxy_pass http://api-gateway:8080;
        proxy_set_header Host $host;
    }

    location /v3/api-docs {
        proxy_pass http://api-gateway:8080;
        proxy_set_header Host $host;
    }

    # Grafana (grafana-lgtm), served from the /monitoring sub-path. No trailing slash/path on
    # proxy_pass, so nginx forwards the request URI unchanged (including the /monitoring prefix) —
    # required because grafana-lgtm is configured with GF_SERVER_SERVE_FROM_SUB_PATH=true and
    # expects to see that prefix itself, not have it stripped.
    location /monitoring {
        proxy_pass http://grafana-lgtm:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Web client — everything else
    location / {
        proxy_pass http://web-client:3000;
        # Preserve the port (e.g. localhost:8080) so Next.js Server Actions origin checks pass.
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
