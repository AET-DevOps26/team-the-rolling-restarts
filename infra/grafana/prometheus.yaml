# docker-compose only: static DNS-name targets, since compose runs 1 replica per service.
# The Kubernetes copies (infra/helm/files/grafana/prometheus.yaml,
# infra/k8s/configmaps/grafana-lgtm-config.yml) use per-pod Kubernetes service discovery
# instead — a static DNS target resolves to the Service's ClusterIP in Kubernetes, which
# load-balances across replicas and corrupts rate()-based queries. See docs/internal/06-observability.md.
---
global:
  scrape_native_histograms: true
otlp:
  keep_identifying_resource_attributes: true
  # Recommended attributes to be promoted to labels.
  promote_resource_attributes:
    - service.instance.id
    - service.name
    - service.namespace
    - service.version
    - cloud.availability_zone
    - cloud.region
    - container.name
    - deployment.environment # backward compatibility
    - deployment.environment.name
    - k8s.cluster.name
    - k8s.container.name
    - k8s.cronjob.name
    - k8s.daemonset.name
    - k8s.deployment.name
    - k8s.job.name
    - k8s.namespace.name
    - k8s.node.name
    - k8s.pod.name
    - k8s.replicaset.name
    - k8s.statefulset.name
    - host.name
    - postgresql.database.name
    - postgresql.schema.name
    - postgresql.table.name
    - postgresql.index.name
    - database # used by otelcol/receiver/mongodb
    - kafka.cluster.alias
storage:
  tsdb:
    # A 10min time window is enough because it can easily absorb retries and network delays.
    out_of_order_time_window: 10m
scrape_configs:
  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["api-gateway:8080"]
  - job_name: user-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["user-service:8081"]
  - job_name: content-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["content-service:8082"]
  - job_name: gen-ai
    metrics_path: /metrics
    static_configs:
      - targets: ["gen-ai:8000"]
