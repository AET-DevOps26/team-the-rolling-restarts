apiVersion: 1

groups:
  - orgId: 1
    name: service-health
    folder: Service Health
    interval: 1m
    rules:
      - uid: slow-response-time
        title: Slow response time (p95 > 1s)
        condition: C
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "p95 request duration for {{ $labels.job }} exceeds 1s"
          description: "The 95th percentile request duration has been above 1 second for more than 5 minutes."
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: prometheus
            model:
              refId: A
              instant: true
              expr: histogram_quantile(0.95, sum(rate({__name__=~"http_server_request_duration_seconds|http_server_request_duration|http_server_duration_milliseconds|http_server_duration_seconds"}[5m])) by (le, job))
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [1]
        noDataState: NoData
        execErrState: Error
      - uid: service-down
        title: Service down
        condition: C
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.job }} is down"
          description: "Prometheus has not been able to scrape {{ $labels.job }} for more than 2 minutes."
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              refId: A
              instant: true
              expr: 'up{job=~"api-gateway|user-service|content-service|gen-ai"}'
          - refId: C
            datasourceUid: __expr__
            model:
              refId: C
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: lt
                    params: [1]
        noDataState: Alerting
        execErrState: Alerting
