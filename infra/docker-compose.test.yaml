services:
  web-client:
    profiles: !reset ["manual"]
    ports: !reset []

  api-gateway:
    profiles: !reset ["manual"]
    ports: !reset []

  user-service:
    profiles: !reset ["manual"]
    ports: !reset []

  content-service:
    profiles: !reset ["manual"]
    ports: !reset []

  gen-ai:
    ports: !reset []

  mongodb:
    ports: !reset []

  grafana-lgtm:
    profiles: !reset ["manual"]
    ports: !reset []

  web-client-test:
    profiles: ["test"]
    build:
      context: ../web-client
      dockerfile: Dockerfile
      target: development
    command: sh -c "npm run lint && npm run build"
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://api-gateway:8080}
    networks:
      - frontend

  spring-test:
    profiles: ["test"]
    image: gradle:jdk-25-and-25@sha256:57c4bd434ea3b77a41796375c4f95a74b3ad6693a6f33595fd6129a74a3d7044
    working_dir: /workspace
    command: >-
      sh -c "./gradlew test --no-daemon -PexcludeTags=smoke;
      rc=$$?;
      find /workspace -maxdepth 3 -name build -type d -exec chown -R ${COMPOSE_UID:-1000}:${COMPOSE_GID:-1000} {} + 2>/dev/null;
      exit $$rc"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
      SPRING_MONGODB_URI: mongodb://${MONGO_ROOT_USERNAME:-root}:${MONGO_ROOT_PASSWORD:-secret}@mongodb:27017/content?authSource=admin
    volumes:
      - ../services/spring:/workspace
      - spring-gradle-cache:/home/gradle/.gradle
    networks:
      - backend

  gen-ai-test:
    profiles: ["test"]
    build:
      context: ../services/gen-ai
      dockerfile: Dockerfile
    command: sh -c "pip install --no-cache-dir -e '.[dev]' && pytest -q"
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - backend

volumes:
  spring-gradle-cache:
