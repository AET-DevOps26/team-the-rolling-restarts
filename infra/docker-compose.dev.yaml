services:
  web-client:
    build:
      context: ../web-client
      dockerfile: Dockerfile
      target: development
    command: >-
      sh -c "if [ ! -d node_modules ] || [ -z \"$(ls -A node_modules 2>/dev/null)\" ];
      then npm ci; fi && npm run dev -- --hostname 0.0.0.0 --port 3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
      WATCHPACK_POLLING: ${WATCHPACK_POLLING:-false}
    volumes:
      - ../web-client:/app
      - web-client-node-modules:/app/node_modules

  api-gateway:
    build: !reset null
    image: gradle:jdk-25-and-25

    working_dir: /workspace
    command: ./gradlew :api-gateway:bootRun --no-daemon --project-cache-dir /tmp/gradle-project
    environment:
      GRADLE_USER_HOME: /gradle-cache/gateway
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
      USER_SERVICE_URL: http://user-service:8081
      CONTENT_SERVICE_URL: http://content-service:8082
      JWT_ISSUER_URI: http://user-service:8081
      SPRING_DEVTOOLS_RESTART_ENABLED: "true"
    volumes:
      - ../services/spring:/workspace
      - spring-gradle-cache:/gradle-cache

  user-service:
    build: !reset null
    image: gradle:jdk-25-and-25

    working_dir: /workspace
    command: ./gradlew :user-service:bootRun --no-daemon --project-cache-dir /tmp/gradle-project
    environment:
      GRADLE_USER_HOME: /gradle-cache/user-service
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
      SPRING_MONGODB_URI: mongodb://${MONGO_ROOT_USERNAME:-root}:${MONGO_ROOT_PASSWORD:-secret}@mongodb:27017/users?authSource=admin
      SPRING_DEVTOOLS_RESTART_ENABLED: "true"
    volumes:
      - ../services/spring:/workspace
      - spring-gradle-cache:/gradle-cache

  content-service:
    build: !reset null
    image: gradle:jdk-25-and-25

    working_dir: /workspace
    command: ./gradlew :content-service:bootRun --no-daemon --project-cache-dir /tmp/gradle-project
    environment:
      GRADLE_USER_HOME: /gradle-cache/content-service
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
      SPRING_MONGODB_URI: mongodb://${MONGO_ROOT_USERNAME:-root}:${MONGO_ROOT_PASSWORD:-secret}@mongodb:27017/content?authSource=admin
      JWT_ISSUER_URI: http://user-service:8081
      SPRING_DEVTOOLS_RESTART_ENABLED: "true"
    volumes:
      - ../services/spring:/workspace
      - spring-gradle-cache:/gradle-cache

  gen-ai:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-exclude .venv
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}
    volumes:
      - ../services/gen-ai:/app

volumes:
  web-client-node-modules:
  spring-gradle-cache:
