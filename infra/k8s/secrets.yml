# MongoDB credentials shared by the database and the Spring services.
# These are DEV DEFAULTS (mirroring infra/helm/values.yaml) — CHANGE THE PASSWORD
# AND URIs FOR ANY REAL DEPLOYMENT, or manage them with a sealed-secret / external
# secret store instead of committing them.
#
# Two secrets exist so each service connects to its own database on the shared
# MongoDB instance:
#   - mongodb-credentials       -> content-service (database: content) + the mongod root user
#   - mongodb-user-credentials  -> user-service    (database: users)
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-credentials
type: Opaque
stringData:
  root-username: root
  root-password: secret
  uri: mongodb://root:secret@mongodb:27017/content?authSource=admin
---
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-user-credentials
type: Opaque
stringData:
  uri: mongodb://root:secret@mongodb:27017/users?authSource=admin
---
# Shared RSA key pair the user-service uses to sign JWTs. All user-service replicas
# load the SAME key (and derive an identical JWK kid from its thumbprint), so a token
# signed by one pod validates against the JWKS served by any pod behind the Service.
# This is a DEV key committed for reproducibility — GENERATE A FRESH PAIR for any real
# deployment (openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 ...) and
# manage it with a sealed-secret / external secret store instead of committing it.
