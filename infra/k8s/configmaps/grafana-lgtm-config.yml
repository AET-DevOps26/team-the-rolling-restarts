# This file is hand-maintained, not generated. Keep in sync with:
#   - infra/helm/files/grafana/dashboards/service-overview.json
#   - infra/helm/files/grafana/provisioning/dashboards/custom-dashboards.yaml
#   - infra/helm/files/grafana/provisioning/alerting/rules.yaml
#   (dashboard + provisioning content must be byte-identical to the copies above,
#   and to infra/grafana/{dashboards,provisioning}/* used by docker-compose)
#
# prometheus.yaml is the ONE exception: this file's scrape_configs uses
# per-pod Kubernetes service discovery (see docs/internal/06-observability.md
# for why), so it intentionally differs from infra/grafana/prometheus.yaml
# (docker-compose, static targets). It is ALSO the one place this copy cannot be
# byte-identical to infra/helm/files/grafana/prometheus.yaml: that Helm copy is rendered through
# `tpl` so `{{ .Release.Namespace }}` resolves to the real app namespace automatically, but this
# raw-manifest copy has no templating — replace <APP_NAMESPACE> below with your actual app
# namespace before applying (see docs/source/infra/k8s/kubernetes.md).
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-lgtm-prometheus-config
  namespace: monitoring-rolling-restarts
data:
  prometheus.yaml: |
    ---
    global:
      scrape_native_histograms: true
    otlp:
      keep_identifying_resource_attributes: true
      # Recommended attributes to be promoted to labels.
      promote_resource_attributes:
        - service.instance.id
        - service.name
        - service.namespace
        - service.version
        - cloud.availability_zone
        - cloud.region
        - container.name
        - deployment.environment # backward compatibility
        - deployment.environment.name
        - k8s.cluster.name
        - k8s.container.name
        - k8s.cronjob.name
        - k8s.daemonset.name
        - k8s.deployment.name
        - k8s.job.name
        - k8s.namespace.name
        - k8s.node.name
        - k8s.pod.name
        - k8s.replicaset.name
        - k8s.statefulset.name
        - host.name
        - postgresql.database.name
        - postgresql.schema.name
        - postgresql.table.name
        - postgresql.index.name
        - database # used by otelcol/receiver/mongodb
        - kafka.cluster.alias
    storage:
      tsdb:
        # A 10min time window is enough because it can easily absorb retries and network delays.
        out_of_order_time_window: 10m
    scrape_configs:
      # Single generic label/annotation-based auto-discovery job, replacing one hardcoded
      # job_name block per service: any pod in the app namespace carrying `monitoring: "true"`
      # is scraped automatically, with its port/path read from `prometheus.io/port`/
      # `prometheus.io/path` annotations. Onboarding a new service means adding those to its pod
      # template — no prometheus.yaml edit needed. `job` is set from the pod's `app` label so
      # existing dashboards/alerts filtering `job=~"api-gateway|..."` keep working unchanged.
      # Replace <APP_NAMESPACE> with your actual app namespace — see the ConfigMap-level comment
      # above.
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ["<APP_NAMESPACE>"]
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_monitoring]
            regex: "true"
            action: keep
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            regex: (.+)
            target_label: __metrics_path__
          - source_labels: [__meta_kubernetes_pod_ip, __meta_kubernetes_pod_annotation_prometheus_io_port]
            regex: (.+);(.+)
            target_label: __address__
            replacement: ${1}:${2}
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: instance
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: job
---
