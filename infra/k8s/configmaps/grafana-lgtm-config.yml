# This file is hand-maintained, not generated. Keep in sync with:
#   - infra/helm/files/grafana/dashboards/service-overview.json
#   - infra/helm/files/grafana/provisioning/dashboards/custom-dashboards.yaml
#   - infra/helm/files/grafana/provisioning/alerting/rules.yaml
#   (dashboard + provisioning content must be byte-identical to the copies above,
#   and to infra/grafana/{dashboards,provisioning}/* used by docker-compose)
#
# prometheus.yaml is the ONE exception: this file's scrape_configs uses
# per-pod Kubernetes service discovery (see docs/internal/06-observability.md
# for why), so it intentionally differs from infra/grafana/prometheus.yaml
# (docker-compose, static targets) but must stay identical to
# infra/helm/files/grafana/prometheus.yaml (the other Kubernetes copy).
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-lgtm-prometheus-config
data:
  prometheus.yaml: |
    ---
    global:
      scrape_native_histograms: true
    otlp:
      keep_identifying_resource_attributes: true
      # Recommended attributes to be promoted to labels.
      promote_resource_attributes:
        - service.instance.id
        - service.name
        - service.namespace
        - service.version
        - cloud.availability_zone
        - cloud.region
        - container.name
        - deployment.environment # backward compatibility
        - deployment.environment.name
        - k8s.cluster.name
        - k8s.container.name
        - k8s.cronjob.name
        - k8s.daemonset.name
        - k8s.deployment.name
        - k8s.job.name
        - k8s.namespace.name
        - k8s.node.name
        - k8s.pod.name
        - k8s.replicaset.name
        - k8s.statefulset.name
        - host.name
        - postgresql.database.name
        - postgresql.schema.name
        - postgresql.table.name
        - postgresql.index.name
        - database # used by otelcol/receiver/mongodb
        - kafka.cluster.alias
    storage:
      tsdb:
        # A 10min time window is enough because it can easily absorb retries and network delays.
        out_of_order_time_window: 10m
    scrape_configs:
      - job_name: api-gateway
        metrics_path: /actuator/prometheus
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              own_namespace: true
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: api-gateway
            action: keep
          - source_labels: [__meta_kubernetes_pod_ip]
            regex: (.+)
            target_label: __address__
            replacement: ${1}:8080
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: instance
      - job_name: user-service
        metrics_path: /actuator/prometheus
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              own_namespace: true
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: user-service
            action: keep
          - source_labels: [__meta_kubernetes_pod_ip]
            regex: (.+)
            target_label: __address__
            replacement: ${1}:8081
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: instance
      - job_name: content-service
        metrics_path: /actuator/prometheus
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              own_namespace: true
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: content-service
            action: keep
          - source_labels: [__meta_kubernetes_pod_ip]
            regex: (.+)
            target_label: __address__
            replacement: ${1}:8082
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: instance
      - job_name: gen-ai
        metrics_path: /metrics
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              own_namespace: true
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app]
            regex: gen-ai
            action: keep
          - source_labels: [__meta_kubernetes_pod_ip]
            regex: (.+)
            target_label: __address__
            replacement: ${1}:8000
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: instance
---
