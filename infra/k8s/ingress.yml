# An Ingress can only target Services in its own namespace, but grafana-lgtm's real Service lives
# in monitoring-rolling-restarts — so route /monitoring through this ExternalName alias instead,
# which just resolves (via cluster DNS) to the real Service in the other namespace. No
# NetworkPolicy exists in this cluster's manifests to block that cross-namespace path.
apiVersion: v1
kind: Service
metadata:
  name: grafana-lgtm-external
spec:
  type: ExternalName
  externalName: grafana-lgtm.monitoring-rolling-restarts.svc.cluster.local
  ports:
    - name: grafana
      port: 3000
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rolling-restarts
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx

  tls:
    - hosts:
        - k8s.rolling-restarts.stud.k8s.aet.cit.tum.de
      secretName: rolling-restarts-tls

  rules:
    # Single host, path-based routing (mirrors the nginx reverse-proxy and the
    # Helm ingress): /api,/actuator/health,/swagger-ui,/v3/api-docs -> api-gateway
    # (the gateway fans /api/ai/** out to gen-ai), /monitoring -> grafana-lgtm (via the
    # ExternalName Service above), everything else -> web client.
    # Only /actuator/health is exposed publicly; Prometheus scrapes api-gateway
    # directly over the internal network, never through this ingress.
    - host: k8s.rolling-restarts.stud.k8s.aet.cit.tum.de
      http:
        paths:
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080
          - path: /actuator/health
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080
          - path: /swagger-ui
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080
          - path: /v3/api-docs
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080
          # No trailing slash and pathType Prefix (matches /monitoring and /monitoring/*) —
          # grafana-lgtm runs with GF_SERVER_SERVE_FROM_SUB_PATH=true (grafana-lgtm-deployment.yml)
          # and expects to see the /monitoring prefix itself, not have it stripped.
          - path: /monitoring
            pathType: Prefix
            backend:
              service:
                name: grafana-lgtm-external
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-client
                port:
                  number: 3000
