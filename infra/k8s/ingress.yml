apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rolling-restarts
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging
spec:
  ingressClassName: nginx

  tls:
    - hosts:
        - app.rolling-restarts.stud.k8s.aet.cit.tum.de
        - api.rolling-restarts.stud.k8s.aet.cit.tum.de
        - ai.rolling-restarts.stud.k8s.aet.cit.tum.de
      secretName: rolling-restarts-tls

  rules:
    # ---------------- FRONTEND (Next.js) ----------------
    - host: app.rolling-restarts.stud.k8s.aet.cit.tum.de
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-client
                port:
                  number: 3000

    # ---------------- SPRING API ----------------
    - host: api.rolling-restarts.stud.k8s.aet.cit.tum.de
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: spring-api
                port:
                  number: 8080

    # ---------------- FASTAPI GEN-AI ----------------
    - host: ai.rolling-restarts.stud.k8s.aet.cit.tum.de
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gen-ai
                port:
                  number: 8000