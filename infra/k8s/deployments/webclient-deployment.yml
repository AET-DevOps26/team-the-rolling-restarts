apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-client
  labels:
    app: web-client
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-client
  template:
    metadata:
      labels:
        app: web-client
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: web-client
          image: ghcr.io/aet-devops26/team-the-rolling-restarts/web-client:wip
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: 3000

          env:
            - name: NODE_ENV
              value: "production"
            # Not NEXT_PUBLIC_-prefixed (see web-client/src/lib/api/client.ts) — read at
            # container runtime, not baked into the image at build time.
            - name: API_BASE_URL
              value: http://api-gateway:8080
            # This deployment target has real TLS (cert-manager/nginx-ingress) — see issue #90
            # for why this can't just be inferred from NODE_ENV.
            - name: COOKIE_SECURE
              value: "true"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://grafana-lgtm.monitoring-rolling-restarts:4318
            - name: OTEL_SERVICE_NAME
              value: web-client

          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20

          # Keep in sync with infra/helm/values.yaml (webClient.resources). 200Mi: 230Mi fixed the
          # earlier tightness with more room than needed (measured live at 41-63% afterward);
          # trimmed back to fund user-service's increase.
          resources:
            requests:
              cpu: "20m"
              memory: "90Mi"
            limits:
              cpu: "100m"
              memory: "200Mi"