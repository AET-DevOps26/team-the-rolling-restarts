apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-client
  labels:
    app: web-client
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-client
  template:
    metadata:
      labels:
        app: web-client
    spec:
      containers:
        - name: web-client
          image: ghcr.io/aet-devops26/team-the-rolling-restarts/web-client:wip
          imagePullPolicy: Always
          ports:
            - containerPort: 3000

          env:
            - name: NODE_ENV
              value: "production"
            # Not NEXT_PUBLIC_-prefixed (see web-client/src/lib/api/client.ts) — read at
            # container runtime, not baked into the image at build time.
            - name: API_BASE_URL
              value: http://api-gateway:8080
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://grafana-lgtm.rolling-restarts-monitoring:4318
            - name: OTEL_SERVICE_NAME
              value: web-client

          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20

          # Keep in sync with infra/helm/values.yaml (webClient.resources). 200Mi: 230Mi fixed the
          # earlier tightness with more room than needed (measured live at 41-63% afterward);
          # trimmed back to fund user-service's increase.
          resources:
            requests:
              cpu: "20m"
              memory: "90Mi"
            limits:
              cpu: "100m"
              memory: "200Mi"