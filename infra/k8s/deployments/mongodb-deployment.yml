apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongodb-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  labels:
    app: mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:8@sha256:b8806ee8207318a30316eca72257da4c146025a80fdcdb4c597e596af9233ee3
          # Not runAsNonRoot (unlike the app Deployments) — the official mongo entrypoint needs
          # root at container start to chown /data/db to the mongodb user before dropping
          # privilege itself; untested whether forcing non-root + fsGroup here would work, and
          # this is the one data-bearing workload, so left alone rather than risk breaking it.
          # capabilities.drop: ["ALL"] alone breaks that same chown-then-drop-to-mongodb-user
          # sequence even as root — see the matching comment in
          # infra/helm/templates/databases.yaml for the confirmed-live repro and minimal fix.
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["CHOWN", "SETUID", "SETGID"]
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: 27017

          env:
            - name: MONGO_INITDB_DATABASE
              value: "content"
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mongodb-credentials
                  key: root-username
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb-credentials
                  key: root-password

          readinessProbe:
            tcpSocket:
              port: 27017
            initialDelaySeconds: 10
            periodSeconds: 10

          livenessProbe:
            tcpSocket:
              port: 27017
            initialDelaySeconds: 30
            periodSeconds: 20

          # Keep in sync with infra/helm/values.yaml (mongodb.resources). 512Mi (not 260Mi): the
          # 260Mi limit caused a live OOMKill during first-boot init (WiredTiger cache warmup +
          # root user creation), interrupting init before the root user was created and leaving
          # every dependent service permanently failing auth even after Mongo itself recovered.
          # See docs/internal/06-observability.md.
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "250m"
              memory: "512Mi"

          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db

      volumes:
        - name: mongodb-data
          persistentVolumeClaim:
            claimName: mongodb-data
