apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  labels:
    app: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: ghcr.io/aet-devops26/team-the-rolling-restarts/api-gateway:wip
          imagePullPolicy: Always

          ports:
            - containerPort: 8080

          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "production"
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:MaxRAMPercentage=75"
            - name: USER_SERVICE_URL
              value: "http://user-service:8081"
            - name: CONTENT_SERVICE_URL
              value: "http://content-service:8082"
            - name: GEN_AI_URL
              value: "http://gen-ai:8000"
            - name: JWT_ISSUER_URI
              value: "http://user-service:8081"
            - name: CORS_ALLOWED_ORIGINS
              value: "https://rolling-restarts.stud.k8s.aet.cit.tum.de"

          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2

          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 2

          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            failureThreshold: 30
            periodSeconds: 10

          # The target cluster enforces a ResourceQuota on LIMITS (total
          # limits.cpu=2, limits.memory=3000Mi), so limits — not just requests —
          # must stay small. These three JVM services dominate the budget:
          # 3 x (350m, 512Mi) = 1050m / 1536Mi of the 2000m / 3000Mi cap.
          # Keep in sync with infra/helm/values.yaml (apiGateway.resources).
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "350m"
              memory: "512Mi"
