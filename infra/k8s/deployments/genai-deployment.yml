apiVersion: apps/v1
kind: Deployment
metadata:
  name: gen-ai
  labels:
    app: gen-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gen-ai
  template:
    metadata:
      labels:
        app: gen-ai
    spec:
      containers:
        - name: gen-ai
          image: ghcr.io/aet-devops26/team-the-rolling-restarts/gen-ai:wip
          imagePullPolicy: Always

          ports:
            - containerPort: 8000

          # Keep env in sync with infra/helm/values.yaml (genAi block); Helm is the primary deploy path.
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: LOG_LEVEL
              value: "INFO"
            - name: LLM_PROVIDER
              value: "logos"
            - name: LLM_BASE_URL
              value: "https://logos.aet.cit.tum.de/v1"
            - name: LLM_MODEL
              value: "openai/gpt-oss-120b"
            - name: INTERNAL_API_URL
              value: "http://api-gateway:8080"
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-credentials
                  key: apiKey
                  optional: true

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20

          # Keep in sync with infra/helm/values.yaml (genAi.resources).
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "300m"
              memory: "384Mi"