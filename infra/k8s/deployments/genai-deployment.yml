apiVersion: apps/v1
kind: Deployment
metadata:
  name: gen-ai
  labels:
    app: gen-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gen-ai
  template:
    metadata:
      labels:
        app: gen-ai
    spec:
      containers:
        - name: gen-ai
          image: ghcr.io/aet-devops26/team-the-rolling-restarts/gen-ai:1eb2b0a
          imagePullPolicy: Always

          ports:
            - containerPort: 8000

          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: LOG_LEVEL
              value: "INFO"

          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"