apiVersion: apps/v1
kind: Deployment
metadata:
  name: gen-ai
  labels:
    app: gen-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gen-ai
  template:
    metadata:
      labels:
        app: gen-ai
        monitoring: "true"
      annotations:
        prometheus.io/port: "8000"
        prometheus.io/path: /metrics
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: gen-ai
          image: ghcr.io/aet-devops26/team-the-rolling-restarts/gen-ai:wip
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault

          ports:
            - containerPort: 8000

          # Keep env in sync with infra/helm/values.yaml (genAi block); Helm is the primary deploy path.
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: LOG_LEVEL
              value: "INFO"
            - name: LLM_PROVIDER
              value: "logos"
            - name: LLM_BASE_URL
              value: "https://logos.aet.cit.tum.de/v1"
            - name: LLM_MODEL
              value: "openai/gpt-oss-120b"
            - name: INTERNAL_API_URL
              value: "http://api-gateway:8080"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://grafana-lgtm.monitoring-rolling-restarts:4318"
            - name: OTEL_SERVICE_NAME
              value: "gen-ai"
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: llm-credentials
                  key: apiKey
                  optional: true

          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20

          # Keep in sync with infra/helm/values.yaml (genAi.resources). 130Mi: measured live at a
          # stable 34-39% of 180Mi across multiple readings (idle usage only ever 62-71Mi) —
          # gen-ai never runs any model locally (ChatOllama/ChatOpenAI in app/llm/provider.py are
          # both thin HTTP clients; Ollama, when used, is a separate container that doesn't exist
          # in Kubernetes at all), so this consistent margin funds user-service's increase. See
          # docs/source/monitoring.md's "Kubernetes resource budget" section.
          resources:
            requests:
              cpu: "30m"
              memory: "80Mi"
            limits:
              cpu: "100m"
              memory: "130Mi"