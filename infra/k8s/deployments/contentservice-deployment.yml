apiVersion: apps/v1
kind: Deployment
metadata:
  name: content-service
  labels:
    app: content-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: content-service
  template:
    metadata:
      labels:
        app: content-service
    spec:
      containers:
        - name: content-service
          image: ghcr.io/aet-devops26/team-the-rolling-restarts/content-service:wip
          imagePullPolicy: Always

          ports:
            - containerPort: 8082

          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "production"
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:MaxRAMPercentage=75"
            - name: JWT_ISSUER_URI
              value: "http://user-service:8081"
            - name: SPRING_MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: mongodb-credentials
                  key: uri

          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2

          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 2

          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            failureThreshold: 30
            periodSeconds: 10

          # The target cluster enforces a ResourceQuota on LIMITS (total
          # limits.cpu=2, limits.memory=3000Mi), so limits — not just requests —
          # must stay small. These three JVM services dominate the budget:
          # 3 x (350m, 512Mi) = 1050m / 1536Mi of the 2000m / 3000Mi cap.
          # Keep in sync with infra/helm/values.yaml (contentService.resources).
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "350m"
              memory: "512Mi"
