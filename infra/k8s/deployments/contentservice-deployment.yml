apiVersion: apps/v1
kind: Deployment
metadata:
  name: content-service
  labels:
    app: content-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: content-service
  template:
    metadata:
      labels:
        app: content-service
    spec:
      containers:
        - name: content-service
          image: ghcr.io/aet-devops26/team-the-rolling-restarts/content-service:wip
          imagePullPolicy: Always

          ports:
            - containerPort: 8082

          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "production"
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:MaxRAMPercentage=75"
            - name: JWT_ISSUER_URI
              value: "http://user-service:8081"
            - name: MANAGEMENT_OTLP_METRICS_EXPORT_URL
              value: "http://grafana-lgtm:4318/v1/metrics"
            - name: MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT
              value: "http://grafana-lgtm:4318/v1/traces"
            - name: MANAGEMENT_OPENTELEMETRY_LOGGING_EXPORT_OTLP_ENDPOINT
              value: "http://grafana-lgtm:4318/v1/logs"
            - name: SPRING_MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: mongodb-credentials
                  key: uri

          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2

          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 2

          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            failureThreshold: 30
            periodSeconds: 10

          # Keep in sync with infra/helm/values.yaml (contentService.resources) — trimmed to make
          # room for grafana-lgtm in the same namespace; see infra/helm/values.yaml's monitoring
          # block for the full budget.
          resources:
            requests:
              cpu: "50m"
              memory: "200Mi"
            limits:
              cpu: "170m"
              memory: "260Mi"
