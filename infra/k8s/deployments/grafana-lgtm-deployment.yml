apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana-lgtm
  labels:
    app: grafana-lgtm
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: grafana-lgtm
  template:
    metadata:
      labels:
        app: grafana-lgtm
    spec:
      serviceAccountName: grafana-lgtm
      containers:
        - name: grafana-lgtm
          image: grafana/otel-lgtm@sha256:10f48eb2f8670134df542177bb19536c55421b089e43f9dfc2a27d4c078204d8
          ports:
            - containerPort: 3000
            - containerPort: 4317
            - containerPort: 4318

          # Keep in sync with infra/helm/values.yaml (monitoring.resources).
          resources:
            requests:
              cpu: "100m"
              memory: "400Mi"
            limits:
              cpu: "350m"
              memory: "640Mi"

          volumeMounts:
            - name: prometheus-config
              mountPath: /otel-lgtm/prometheus.yaml
              subPath: prometheus.yaml
            - name: dashboard
              mountPath: /otel-lgtm/grafana-dashboards-custom/service-overview.json
              subPath: service-overview.json
            - name: dashboard
              mountPath: /otel-lgtm/grafana-dashboards-custom/red-metrics-classic.json
              subPath: red-metrics-classic.json
            - name: provisioning
              mountPath: /otel-lgtm/grafana/conf/provisioning/dashboards/custom-dashboards.yaml
              subPath: custom-dashboards.yaml
            - name: provisioning
              mountPath: /otel-lgtm/grafana/conf/provisioning/dashboards/grafana-dashboards.yaml
              subPath: default-dashboards-override.yaml
            - name: provisioning
              mountPath: /otel-lgtm/grafana/conf/provisioning/alerting/rules.yaml
              subPath: rules.yaml
      volumes:
        - name: prometheus-config
          configMap:
            name: grafana-lgtm-prometheus-config
        - name: dashboard
          configMap:
            name: grafana-lgtm-dashboard
        - name: provisioning
          configMap:
            name: grafana-lgtm-provisioning
