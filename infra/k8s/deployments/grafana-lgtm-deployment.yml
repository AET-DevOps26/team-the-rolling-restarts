apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-lgtm-data
  namespace: monitoring-rolling-restarts
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana-lgtm
  namespace: monitoring-rolling-restarts
  labels:
    app: grafana-lgtm
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: grafana-lgtm
  template:
    metadata:
      labels:
        app: grafana-lgtm
    spec:
      serviceAccountName: grafana-lgtm
      containers:
        - name: grafana-lgtm
          image: grafana/otel-lgtm@sha256:10f48eb2f8670134df542177bb19536c55421b089e43f9dfc2a27d4c078204d8
          ports:
            - containerPort: 3000
            - containerPort: 4317
            - containerPort: 4318

          env:
            # The base image's own run-grafana.sh defaults this to "true" with org role "Admin" —
            # without this override, anyone reaching the Service gets full admin access with no
            # login at all, making the password below moot. Confirmed live against the
            # docker-compose copy of this same image before this was set.
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-admin-credentials
                  key: password
            # Routed through the shared ingress at /monitoring (infra/k8s/ingress.yml) via an
            # ExternalName Service, since an Ingress can only target Services in its own namespace
            # and grafana-lgtm lives in monitoring-rolling-restarts.
            - name: GF_SERVER_ROOT_URL
              value: "https://k8s.rolling-restarts.stud.k8s.aet.cit.tum.de/monitoring/"
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"

          # Keep in sync with infra/helm/values.yaml (monitoring.resources). 850Mi/400m (not
          # 900Mi/450m): the dedicated monitoring-rolling-restarts namespace has its own
          # ResourceQuota (500m CPU / 900Mi memory hard limit, confirmed live via
          # `kubectl describe resourcequota -n monitoring-rolling-restarts`) — grafana-lgtm is
          # the only workload there, but sizing exactly at the ceiling leaves zero headroom for
          # anything else ever added. 850Mi/400m still covers the active-dashboard-browsing OOM
          # this stack hit before (measured at 725Mi/80% of a 900Mi limit under that load).
          resources:
            requests:
              cpu: "100m"
              memory: "480Mi"
            limits:
              cpu: "400m"
              memory: "850Mi"

          volumeMounts:
            - name: data
              mountPath: /data
            - name: prometheus-config
              mountPath: /otel-lgtm/prometheus.yaml
              subPath: prometheus.yaml
            - name: dashboard
              mountPath: /otel-lgtm/grafana-dashboards-custom/service-overview.json
              subPath: service-overview.json
            - name: dashboard
              mountPath: /otel-lgtm/grafana-dashboards-custom/red-metrics-classic.json
              subPath: red-metrics-classic.json
            - name: dashboard
              mountPath: /otel-lgtm/grafana-dashboards-custom/genai-overview.json
              subPath: genai-overview.json
            - name: dashboard
              mountPath: /otel-lgtm/grafana-dashboards-custom/webclient-overview.json
              subPath: webclient-overview.json
            - name: provisioning
              mountPath: /otel-lgtm/grafana/conf/provisioning/dashboards/custom-dashboards.yaml
              subPath: custom-dashboards.yaml
            - name: provisioning
              mountPath: /otel-lgtm/grafana/conf/provisioning/dashboards/grafana-dashboards.yaml
              subPath: default-dashboards-override.yaml
            - name: provisioning
              mountPath: /otel-lgtm/grafana/conf/provisioning/alerting/rules.yaml
              subPath: rules.yaml
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: grafana-lgtm-data
        - name: prometheus-config
          configMap:
            name: grafana-lgtm-prometheus-config
        - name: dashboard
          configMap:
            name: grafana-lgtm-dashboard
        - name: provisioning
          configMap:
            name: grafana-lgtm-provisioning
