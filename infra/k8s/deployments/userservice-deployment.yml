apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  labels:
    app: user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: ghcr.io/aet-devops26/team-the-rolling-restarts/user-service:wip
          imagePullPolicy: Always

          ports:
            - containerPort: 8081

          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "production"
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:MaxRAMPercentage=75"
            - name: JWT_ISSUER
              value: "http://user-service:8081"
            - name: CONTENT_SERVICE_URL
              value: "http://content-service:8082"
            - name: SPRING_MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: mongodb-user-credentials
                  key: uri
            # Shared JWT signing key so all replicas issue/serve consistent tokens + JWKS.
            - name: JWT_RSA_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: jwt-keys
                  key: public-key
            - name: JWT_RSA_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: jwt-keys
                  key: private-key
            # Shared secret for the client_credentials machine token user-service uses to call
            # content-service's subscribe/unsubscribe endpoints (scope source.write).
            - name: SERVICE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: service-credentials
                  key: client-secret
                  # Optional: if the service-credentials Secret is absent, user-service starts
                  # anyway and the subscriber-count sync no-ops (security is unaffected).
                  optional: true

          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2

          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 2

          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            failureThreshold: 30
            periodSeconds: 10

          # The target cluster enforces a ResourceQuota on LIMITS (total
          # limits.cpu=2, limits.memory=3000Mi), so limits — not just requests —
          # must stay small. These three JVM services dominate the budget:
          # 3 x (350m, 512Mi) = 1050m / 1536Mi of the 2000m / 3000Mi cap.
          # Keep in sync with infra/helm/values.yaml (userService.resources).
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "350m"
              memory: "512Mi"
