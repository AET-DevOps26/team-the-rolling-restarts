apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  labels:
    app: user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
        monitoring: "true"
      annotations:
        prometheus.io/port: "8081"
        prometheus.io/path: /actuator/prometheus
    spec:
      containers:
        - name: user-service
          image: ghcr.io/aet-devops26/team-the-rolling-restarts/user-service:wip
          imagePullPolicy: Always

          ports:
            - containerPort: 8081

          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "production"
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:MaxRAMPercentage=75"
            - name: JWT_ISSUER
              value: "http://user-service:8081"
            - name: CONTENT_SERVICE_URL
              value: "http://content-service:8082"
            - name: MANAGEMENT_OTLP_METRICS_EXPORT_URL
              value: "http://grafana-lgtm.rolling-restarts-monitoring:4318/v1/metrics"
            - name: MANAGEMENT_OPENTELEMETRY_TRACING_EXPORT_OTLP_ENDPOINT
              value: "http://grafana-lgtm.rolling-restarts-monitoring:4318/v1/traces"
            - name: MANAGEMENT_OPENTELEMETRY_LOGGING_EXPORT_OTLP_ENDPOINT
              value: "http://grafana-lgtm.rolling-restarts-monitoring:4318/v1/logs"
            - name: SPRING_MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: mongodb-user-credentials
                  key: uri
            # Shared JWT signing key so all replicas issue/serve consistent tokens + JWKS.
            - name: JWT_RSA_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: jwt-keys
                  key: public-key
            - name: JWT_RSA_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: jwt-keys
                  key: private-key
            # Shared secret for the client_credentials machine token user-service uses to call
            # content-service's subscribe/unsubscribe endpoints (scope source.write).
            - name: SERVICE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: service-credentials
                  key: client-secret

          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2

          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 2

          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            failureThreshold: 30
            periodSeconds: 10

          # Keep in sync with infra/helm/values.yaml (userService.resources). See
          # docs/source/monitoring.md's "Kubernetes resource budget" section for the full
          # per-service distribution across the namespace's 4 CPU / 6144Mi quota at 3 replicas
          # each.
          resources:
            requests:
              cpu: "60m"
              memory: "210Mi"
            limits:
              cpu: "220m"
              # 460Mi: measured live climbing steadily across 3 idle readings (70-72% -> 78-81%
              # -> 82-86% of 400Mi), notably higher than content-service's stable 75-77% on the
              # same limit — 400Mi wasn't enough margin. See docs/internal/06-observability.md.
              memory: "460Mi"
