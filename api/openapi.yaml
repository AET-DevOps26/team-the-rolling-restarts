components:
  schemas:
    Article:
      properties:
        author:
          type: string
        body:
          items:
            type: string
          type: array
        externalUrl:
          type: string
        fetchedAt:
          format: date-time
          type: string
        headline:
          type: string
        id:
          type: string
        imageUrl:
          type: string
        publishedAt:
          format: date-time
          type: string
        readingMinutes:
          format: int32
          type: integer
        snippet:
          type: string
        sourceId:
          type: string
        topicId:
          type: string
      type: object
    CreateSourceRequest:
      properties:
        name:
          minLength: 1
          type: string
        rssUrl:
          minLength: 1
          type: string
      required:
      - name
      - rssUrl
      type: object
    LoginRequest:
      properties:
        password:
          minLength: 1
          type: string
        username:
          minLength: 1
          type: string
      required:
      - password
      - username
      type: object
    PageArticle:
      properties:
        content:
          items:
            $ref: '#/components/schemas/Article'
          type: array
        empty:
          type: boolean
        first:
          type: boolean
        last:
          type: boolean
        number:
          format: int32
          type: integer
        numberOfElements:
          format: int32
          type: integer
        pageable:
          $ref: '#/components/schemas/PageableObject'
        size:
          format: int32
          type: integer
        sort:
          $ref: '#/components/schemas/SortObject'
        totalElements:
          format: int64
          type: integer
        totalPages:
          format: int32
          type: integer
      type: object
    Pageable:
      properties:
        page:
          format: int32
          minimum: 0
          type: integer
        size:
          format: int32
          minimum: 1
          type: integer
        sort:
          items:
            type: string
          type: array
      type: object
    PageableObject:
      properties:
        offset:
          format: int64
          type: integer
        pageNumber:
          format: int32
          type: integer
        pageSize:
          format: int32
          type: integer
        paged:
          type: boolean
        sort:
          $ref: '#/components/schemas/SortObject'
        unpaged:
          type: boolean
      type: object
    RegisterRequest:
      properties:
        email:
          format: email
          minLength: 1
          type: string
        name:
          type: string
        password:
          maxLength: 2147483647
          minLength: 8
          type: string
        username:
          maxLength: 50
          minLength: 3
          type: string
      required:
      - email
      - password
      - username
      type: object
    SortObject:
      properties:
        empty:
          type: boolean
        sorted:
          type: boolean
        unsorted:
          type: boolean
      type: object
    Source:
      properties:
        active:
          type: boolean
        createdAt:
          format: date-time
          type: string
        fetchError:
          type: string
        fetchStatus:
          enum:
          - PENDING
          - SUCCESS
          - FAILED
          type: string
        id:
          type: string
        initials:
          type: string
        lastFetchedAt:
          format: date-time
          type: string
        name:
          type: string
        rssUrl:
          type: string
        subscriberCount:
          format: int32
          type: integer
      type: object
    TokenResponse:
      properties:
        token:
          type: string
      type: object
    Topic:
      properties:
        color:
          type: string
        id:
          type: string
        name:
          type: string
      type: object
    UpdateProfileRequest:
      properties:
        email:
          format: email
          type: string
        name:
          type: string
      type: object
    UserProfileResponse:
      properties:
        avatarInitials:
          type: string
        email:
          type: string
        id:
          type: string
        name:
          type: string
        username:
          type: string
      type: object
    UserResponse:
      properties:
        avatarInitials:
          type: string
        email:
          type: string
        id:
          type: string
        name:
          type: string
        username:
          type: string
      type: object
    UserSettingsRequest:
      properties:
        enabledSourceIds:
          items:
            type: string
          type: array
        savedArticleIds:
          items:
            type: string
          type: array
        selectedTopicIds:
          items:
            type: string
          type: array
      type: object
    UserSettingsResponse:
      properties:
        enabledSourceIds:
          items:
            type: string
          type: array
        savedArticleIds:
          items:
            type: string
          type: array
        selectedTopicIds:
          items:
            type: string
          type: array
      type: object
  securitySchemes:
    bearer-jwt:
      bearerFormat: JWT
      scheme: bearer
      type: http
info:
  title: Personalised News Aggregator API
  version: 1.0.0
openapi: 3.1.0
paths:
  /api/content/articles:
    get:
      description: Returns a paginated list of articles, optionally filtered by source, topic, and/or
        search query
      operationId: list_2
      parameters:
      - description: Filter by source ID
        in: query
        name: sourceId
        required: false
        schema:
          type: string
      - description: Filter to a set of source IDs (e.g. a caller's subscribed sources), so pagination
          totals are computed post-filter instead of requiring the caller to filter results client-side
        in: query
        name: sourceIds
        required: false
        schema:
          items:
            type: string
          type: array
      - description: Filter by topic ID
        in: query
        name: topicId
        required: false
        schema:
          type: string
      - description: Case-insensitive search in headline and snippet
        in: query
        name: q
        required: false
        schema:
          type: string
      - in: query
        name: pageable
        required: true
        schema:
          $ref: '#/components/schemas/Pageable'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageArticle'
          description: OK
      summary: List articles
      tags:
      - Articles
  /api/content/articles/saved:
    post:
      description: Returns articles matching the provided list of IDs, useful for fetching a user's saved
        articles
      operationId: getSaved
      requestBody:
        content:
          application/json:
            schema:
              items:
                type: string
              type: array
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Article'
                type: array
          description: Matching articles
        '401':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Article'
                type: array
          description: Not authenticated
      security:
      - bearer-jwt: []
      summary: Batch-get articles by IDs
      tags:
      - Articles
  /api/content/articles/{id}:
    get:
      operationId: get_1
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Article'
          description: Article found
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Article'
          description: Article not found
      summary: Get full article
      tags:
      - Articles
  /api/content/sources:
    get:
      operationId: list
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Source'
                type: array
          description: OK
      summary: List all RSS sources
      tags:
      - Sources
    post:
      description: Adds a new RSS source. If the URL already exists, returns the existing source.
      operationId: create
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSourceRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Source'
          description: Source already exists
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Source'
          description: Source created
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Source'
          description: Not authenticated
      security:
      - bearer-jwt: []
      summary: Submit a new RSS feed URL
      tags:
      - Sources
  /api/content/sources/{id}:
    get:
      operationId: get
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Source'
          description: Source found
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Source'
          description: Source not found
      summary: Get source details
      tags:
      - Sources
  /api/content/sources/{id}/subscribe:
    post:
      description: Increments the source's subscriber count. Intended for service-to-service use by user-service
        when a user subscribes.
      operationId: incrementSourceSubscribers
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Source'
          description: Subscription registered
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Source'
          description: Not authenticated
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Source'
          description: Source not found
      security:
      - bearer-jwt: []
      summary: Register a subscription to a source
      tags:
      - Sources
  /api/content/sources/{id}/unsubscribe:
    post:
      description: Decrements the source's subscriber count; the source is deleted once the count reaches
        zero. Intended for service-to-service use by user-service.
      operationId: decrementSourceSubscribers
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
      responses:
        '204':
          description: Subscription removed
        '401':
          description: Not authenticated
        '404':
          description: Source not found
      security:
      - bearer-jwt: []
      summary: Remove a subscription from a source
      tags:
      - Sources
  /api/content/topics:
    get:
      operationId: list_1
      responses:
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Topic'
                type: array
          description: OK
      summary: List all topics
      tags:
      - Topics
  /api/users/auth/login:
    post:
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
          description: JWT token
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
          description: Invalid credentials
      summary: Authenticate and obtain a JWT
      tags:
      - Authentication
  /api/users/auth/register:
    post:
      description: Creates a new user account. The OAuth2 token endpoint at /oauth2/token handles login.
      operationId: register
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
          description: User created
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
          description: Validation error or duplicate username/email
      summary: Register a new user
      tags:
      - Authentication
  /api/users/users/me:
    get:
      operationId: me
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
          description: User profile
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
          description: Not authenticated
      security:
      - bearer-jwt: []
      summary: Get current user profile
      tags:
      - Users
    put:
      operationId: updateProfile
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
          description: Updated profile
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
          description: Not authenticated
      security:
      - bearer-jwt: []
      summary: Update current user profile
      tags:
      - Users
  /api/users/users/me/saved-articles/{articleId}:
    delete:
      description: Atomically removes the article from the user's saved list.
      operationId: unsaveArticle
      parameters:
      - in: path
        name: articleId
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettingsResponse'
          description: Article removed from saved
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettingsResponse'
          description: Not authenticated
      security:
      - bearer-jwt: []
      summary: Remove a saved article for the current user
      tags:
      - Users
    post:
      description: Atomically adds the article to the user's saved list.
      operationId: saveArticle
      parameters:
      - in: path
        name: articleId
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettingsResponse'
          description: Article saved
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettingsResponse'
          description: Not authenticated
      security:
      - bearer-jwt: []
      summary: Save an article for the current user
      tags:
      - Users
  /api/users/users/me/settings:
    get:
      description: 'Returns user preferences: selected topics, enabled sources, and saved article IDs'
      operationId: getSettings
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettingsResponse'
          description: User settings
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettingsResponse'
          description: Not authenticated
      security:
      - bearer-jwt: []
      summary: Get current user settings
      tags:
      - Users
    put:
      operationId: updateSettings
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserSettingsRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettingsResponse'
          description: Updated settings
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettingsResponse'
          description: Not authenticated
      security:
      - bearer-jwt: []
      summary: Update current user settings
      tags:
      - Users
  /api/users/users/me/subscriptions/{sourceId}:
    delete:
      description: Removes the source from the user's enabled sources and decrements the shared subscriber
        count in content-service (the source is removed there once nobody is subscribed).
      operationId: unsubscribeFromSource
      parameters:
      - in: path
        name: sourceId
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettingsResponse'
          description: Unsubscribed
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettingsResponse'
          description: Not authenticated
      security:
      - bearer-jwt: []
      summary: Unsubscribe the current user from a source
      tags:
      - Users
    post:
      description: Adds the source to the user's enabled sources and increments the shared subscriber
        count in content-service.
      operationId: subscribeToSource
      parameters:
      - in: path
        name: sourceId
        required: true
        schema:
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettingsResponse'
          description: Subscribed
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserSettingsResponse'
          description: Not authenticated
      security:
      - bearer-jwt: []
      summary: Subscribe the current user to a source
      tags:
      - Users
servers:
- url: /
