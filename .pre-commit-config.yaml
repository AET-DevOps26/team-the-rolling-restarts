repos:
  - repo: local
    hooks:
      - id: redocly-lint
        name: Lint OpenAPI spec
        entry: npx @redocly/cli lint
        language: system
        files: ^api/openapi\.yaml$
      - id: generate-api-clients
        name: Generate API Clients
        entry: ./api/scripts/gen-all.sh
        language: script
        stages: [post-checkout, post-merge]
        always_run: true
        pass_filenames: false